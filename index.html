<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Dias de Marmita</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#F6F2E9;--bg-warm:#EFE9DB;--surface:#FFFEF9;--border:#E5DECE;--border-strong:#C8C0A8;--text:#1F2420;--muted:#807966;--muted-2:#A39B86;--dark:#1F2420;--yellow:#E8B533;--yellow-soft:#FBF0C5;--yellow-deep:#C49A20;--primary-soft:#6B8F71;--radius:12px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Manrope',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.font-display{font-family:'Fraunces',serif}
input,select,textarea{font-family:'Manrope',sans-serif;width:100%;padding:.55rem .85rem;border:1.5px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text);font-size:.9rem;outline:none;transition:border-color .15s}
input:focus,select:focus,textarea:focus{border-color:var(--yellow-deep)}
select{appearance:none;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%23807966' stroke-width='2'><polyline points='6 9 12 15 18 9'/></svg>");background-repeat:no-repeat;background-position:right .7rem center;padding-right:2rem}
textarea{resize:vertical;min-height:80px}
button{font-family:'Manrope',sans-serif;cursor:pointer;border:none;background:none}
.btn{display:inline-flex;align-items:center;gap:.4rem;padding:.55rem 1.1rem;border-radius:999px;font-weight:700;font-size:.85rem;transition:all .15s}
.btn-yellow{background:var(--yellow);color:var(--dark)}.btn-yellow:hover{background:var(--yellow-deep)}
.btn-ghost{background:transparent;border:1.5px solid var(--border);color:var(--muted)}.btn-ghost:hover,.btn-ghost.active{background:var(--bg-warm);color:var(--text);border-color:var(--border-strong)}
.btn-icon{width:32px;height:32px;border-radius:8px;display:inline-flex;align-items:center;justify-content:center;color:var(--muted);transition:all .15s}.btn-icon:hover{background:var(--bg-warm);color:var(--text)}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1rem}
.label{font-size:.7rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:.35rem}
.pill{display:inline-flex;align-items:center;gap:.25rem;padding:.2rem .65rem;border-radius:999px;font-size:.72rem;font-weight:700;border:1.5px solid transparent;cursor:pointer;transition:all .15s}
.nav{display:flex;gap:.25rem;overflow-x:auto;padding:.5rem 0;border-bottom:1px solid var(--border);margin-bottom:1.5rem}
.nav-btn{flex-shrink:0;padding:.5rem 1rem;border-radius:999px;font-size:.82rem;font-weight:600;color:var(--muted);background:transparent;border:1.5px solid transparent;transition:all .15s}
.nav-btn.active{background:var(--dark);color:var(--yellow);border-color:var(--dark)}
.nav-btn:hover:not(.active){background:var(--bg-warm);color:var(--text)}
.modal-bg{position:fixed;inset:0;background:rgba(31,36,32,.45);z-index:50;display:flex;align-items:flex-end;justify-content:center;padding:1rem}
@media(min-width:640px){.modal-bg{align-items:center}}
.modal{background:var(--bg);border-radius:16px 16px 0 0;width:100%;max-width:560px;max-height:90vh;overflow-y:auto}
@media(min-width:640px){.modal{border-radius:16px}}
.modal-header{position:sticky;top:0;background:var(--bg);padding:1.1rem 1.25rem .75rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;z-index:5}
.modal-body{padding:1rem 1.25rem 1.5rem}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:.85rem 1rem}
.order-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1rem;transition:border-color .15s}
.order-card:hover{border-color:var(--border-strong)}
.empty{text-align:center;padding:3rem 1rem;color:var(--muted)}
.empty-icon{font-size:2.5rem;margin-bottom:.75rem}
.divider{height:1px;background:var(--border);margin:.75rem 0}
.loading{display:flex;align-items:center;justify-content:center;padding:3rem;gap:.75rem;color:var(--muted)}
.spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--yellow-deep);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.badge{display:inline-flex;align-items:center;justify-content:center;min-width:18px;height:18px;padding:0 4px;border-radius:999px;font-size:.62rem;font-weight:700}
</style>
</head>
<body>

<div id="app"></div>

<script type="module">
// ── Supabase ──────────────────────────────────────────
const SUPA_URL = 'https://loljclllxlowcvffskrd.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxvbGpjbGxseGxvd2N2ZmZza3JkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3OTM3MTksImV4cCI6MjA5NDM2OTcxOX0.Q_YskpQR1IyZ2Tk9T7D7_bEh7hKIE37zgBh2Uj37PAI';
const H = {'Content-Type':'application/json','apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Prefer':'return=representation'};

async function db(table, method='GET', body=null, query=''){
  const r = await fetch(`${SUPA_URL}/rest/v1/${table}${query}`,{method,headers:H,body:body?JSON.stringify(body):null});
  if(!r.ok){const e=await r.json();throw new Error(e.message||r.status);}
  return method==='DELETE'?null:r.json();
}
const get=(t,q='')=>db(t,'GET',null,q);
const ins=(t,b)=>db(t,'POST',b);
const upd=(t,q,b)=>db(t,'PATCH',b,q);
const del=(t,q)=>db(t,'DELETE',null,q);
const upsert=(t,b)=>fetch(`${SUPA_URL}/rest/v1/${t}`,{method:'POST',headers:{...H,'Prefer':'resolution=merge-duplicates,return=representation'},body:JSON.stringify(b)}).then(r=>r.json());

// ── Helpers ───────────────────────────────────────────
const fmtBRL=v=>new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'}).format(v||0);
const fmtDate=iso=>{if(!iso)return'';const[y,m,d]=iso.split('-');return`${d}/${m}/${y}`;};
const todayISO=()=>new Date().toISOString().split('T')[0];
const fmtPhone=t=>{if(!t)return'';const d=t.replace(/\D/g,'');return d.length===11?`(${d.slice(0,2)}) ${d.slice(2,7)}-${d.slice(7)}`:`(${d.slice(0,2)}) ${d.slice(2,6)}-${d.slice(6)}`;};
const cleanPhone=t=>(t||'').replace(/\D/g,'');
const copyText=async txt=>{try{await navigator.clipboard.writeText(txt);}catch{const el=document.createElement('textarea');el.value=txt;el.style.cssText='position:fixed;opacity:0';document.body.appendChild(el);el.select();document.execCommand('copy');document.body.removeChild(el);}};
const genId=()=>`${Date.now()}_${Math.random().toString(36).slice(2,7)}`;
const svgIcon=(path,size=16)=>`<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${path}</svg>`;
const icons={x:svgIcon('<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>'),plus:svgIcon('<line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>'),edit:svgIcon('<path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>'),trash:svgIcon('<polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/>'),check:svgIcon('<polyline points="20 6 9 20 4 15"/>'),search:svgIcon('<circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>'),more:svgIcon('<circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/>'),truck:svgIcon('<rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/>'),wallet:svgIcon('<rect x="2" y="5" width="20" height="14" rx="2"/><path d="M16 14h2"/>'),pkg:svgIcon('<path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>'),users:svgIcon('<path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>'),alert:svgIcon('<circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>'),msg:svgIcon('<path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>'),spark:svgIcon('<polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>'),map:svgIcon('<path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/>'),};

// ── State ─────────────────────────────────────────────
let state = {
  view:'pedidos', loading:true, saving:false,
  pedidos:[], clientesMeta:[], despesasVar:[], finConfig:{despesasFixas:[],categorias:['Carnes','Carboidratos','Legumes','Temperos/Condimentos','Embalagens','Gás/Energia','Outros']},
  templates:[], estoque:[], listaCompras:[],
  filterDate:'hoje', search:'', editing:null, editingDespesa:null,
  showImport:false, showTemplates:false, savingAsTemplate:null,
  selectMode:false, selectedIds:new Set(),
  showDelivery:false, showPendencias:false,
};

function setState(patch){Object.assign(state,typeof patch==='function'?patch(state):patch);render();}

// ── Data Layer ────────────────────────────────────────
async function loadAll(){
  setState({loading:true});
  try{
    const [pedidos,meta,desp,cfg,tmpl,est,lista]=await Promise.all([
      get('pedidos','?order=created_at.desc&limit=500'),
      get('clientes_meta'),
      get('despesas_var','?order=data.desc'),
      get('financeiro_config','?id=eq.1'),
      get('templates','?order=created_at.desc'),
      get('estoque','?order=nome.asc'),
      get('lista_compras','?order=created_at.asc'),
    ]);
    setState({
      pedidos: pedidos.map(normalizePedido),
      clientesMeta: meta||[],
      despesasVar: desp||[],
      finConfig: cfg?.[0]?.config || state.finConfig,
      templates: tmpl||[],
      estoque: est||[],
      listaCompras: lista||[],
      loading:false,
    });
  }catch(e){console.error(e);setState({loading:false});}
}

function normalizePedido(p){
  return {
    id:p.id, nome:p.nome||'', telefone:p.telefone||'', endereco:p.endereco||'', complemento:p.complemento||'',
    quantidade:p.quantidade||1, valor:+p.valor||0, valorCartao:+p.valor_cartao||0, valorPix:+p.valor_pix||0,
    prazo:p.prazo||'', formaEntrega:p.forma_entrega||'Motoboy', formaPagamento:p.forma_pagamento||'Pix',
    statusConfirmacao:p.status_confirmacao||'Aguardando', statusPagamento:p.status_pagamento||'Pendente',
    statusPedido:p.status_pedido||'Confirmado', codigoDesconto:p.codigo_desconto||'',
    percentualDesconto:+p.percentual_desconto||0, obs:p.obs||'', itens:p.itens||[], createdAt:p.created_at,
  };
}

function toDb(o){
  return {
    id:o.id, nome:o.nome, telefone:o.telefone, endereco:o.endereco, complemento:o.complemento,
    quantidade:o.quantidade, valor:o.valor, valor_cartao:o.valorCartao, valor_pix:o.valorPix,
    prazo:o.prazo||null, forma_entrega:o.formaEntrega, forma_pagamento:o.formaPagamento,
    status_confirmacao:o.statusConfirmacao, status_pagamento:o.statusPagamento, status_pedido:o.statusPedido,
    codigo_desconto:o.codigoDesconto||null, percentual_desconto:o.percentualDesconto||0,
    obs:o.obs, itens:o.itens||[],
  };
}

async function savePedido(order){
  setState({saving:true});
  try{
    const existing = state.pedidos.find(p=>p.id===order.id);
    if(existing){
      await upd('pedidos',`?id=eq.${order.id}`,toDb(order));
    } else {
      await ins('pedidos',toDb(order));
    }
    await loadAll();
  }catch(e){alert('Erro ao salvar: '+e.message);}
  setState({saving:false,editing:null});
}

async function deletePedido(id){
  if(!confirm('Excluir este pedido?'))return;
  await del('pedidos',`?id=eq.${id}`);
  setState(s=>({pedidos:s.pedidos.filter(p=>p.id!==id)}));
}

async function updateField(id,field,value){
  const fieldMap={statusConfirmacao:'status_confirmacao',statusPagamento:'status_pagamento',statusPedido:'status_pedido'};
  const dbField=fieldMap[field]||field;
  setState(s=>({pedidos:s.pedidos.map(p=>p.id===id?{...p,[field]:value}:p)}));
  try{await upd('pedidos',`?id=eq.${id}`,{[dbField]:value});}catch(e){console.error(e);}
}

async function bulkUpdate(field,value){
  const ids=[...state.selectedIds];
  const fieldMap={statusPedido:'status_pedido',statusPagamento:'status_pagamento'};
  const dbField=fieldMap[field]||field;
  setState(s=>({pedidos:s.pedidos.map(p=>ids.includes(p.id)?{...p,[field]:value}:p),selectedIds:new Set(),selectMode:false}));
  for(const id of ids){try{await upd('pedidos',`?id=eq.${id}`,{[dbField]:value});}catch(e){}}
}

async function saveTemplate(tmpl){
  const t={id:tmpl.id||genId(),nome:tmpl.nome,cliente_nome:tmpl.clienteNome,cliente_telefone:tmpl.clienteTelefone,endereco:tmpl.endereco,complemento:tmpl.complemento,quantidade:tmpl.quantidade,itens:tmpl.itens||[],obs:tmpl.obs,forma_pagamento:tmpl.formaPagamento,forma_entrega:tmpl.formaEntrega,valor_cartao:tmpl.valorCartao||0,valor_pix:tmpl.valorPix||0,last_used:tmpl.lastUsed||null,use_count:tmpl.useCount||0};
  await upsert('templates',t);
  setState(s=>({templates:s.templates.find(x=>x.id===t.id)?s.templates.map(x=>x.id===t.id?{...x,...tmpl}:x):[{...tmpl,id:t.id},...s.templates]}));
}

async function deleteTemplate(id){
  if(!confirm('Excluir template?'))return;
  await del('templates',`?id=eq.${id}`);
  setState(s=>({templates:s.templates.filter(t=>t.id!==id)}));
}

async function saveEstoque(item){
  const row={id:item.id||genId(),nome:item.nome,unidade:item.unidade,quantidade:+item.quantidade||0,media_uso:+item.mediaUso||0,limite_amarelo:+item.limiteAmarelo||0,limite_vermelho:+item.limiteVermelho||0,quantidade_alvo:+item.quantidadeAlvo||0,categoria:item.categoria,updated_at:new Date().toISOString()};
  await upsert('estoque',row);
  const norm={...item,id:row.id,mediaUso:row.media_uso,limiteAmarelo:row.limite_amarelo,limiteVermelho:row.limite_vermelho,quantidadeAlvo:row.quantidade_alvo};
  setState(s=>({estoque:s.estoque.find(x=>x.id===row.id)?s.estoque.map(x=>x.id===row.id?norm:x):[...s.estoque,norm]}));
}

async function deleteEstoque(id){
  await del('estoque',`?id=eq.${id}`);
  setState(s=>({estoque:s.estoque.filter(x=>x.id!==id)}));
}

async function saveListaItem(item){
  const row={id:item.id||genId(),nome:item.nome,quantidade:item.quantidade,unidade:item.unidade,categoria:item.categoria,checked:item.checked||false};
  await upsert('lista_compras',row);
  const exists=state.listaCompras.find(x=>x.id===row.id);
  setState(s=>({listaCompras:exists?s.listaCompras.map(x=>x.id===row.id?{...x,...row}:x):[...s.listaCompras,row]}));
}

async function toggleListaItem(id){
  const item=state.listaCompras.find(x=>x.id===id);
  if(!item)return;
  const checked=!item.checked;
  setState(s=>({listaCompras:s.listaCompras.map(x=>x.id===id?{...x,checked}:x)}));
  await upd('lista_compras',`?id=eq.${id}`,{checked});
}

async function deleteListaItem(id){
  await del('lista_compras',`?id=eq.${id}`);
  setState(s=>({listaCompras:s.listaCompras.filter(x=>x.id!==id)}));
}

async function clearListaComprada(){
  const checked=state.listaCompras.filter(x=>x.checked).map(x=>x.id);
  if(!checked.length)return;
  for(const id of checked)await del('lista_compras',`?id=eq.${id}`);
  setState(s=>({listaCompras:s.listaCompras.filter(x=>!x.checked)}));
}

// ── Filtered Orders ───────────────────────────────────
function getVisibleOrders(){
  let orders=[...state.pedidos];
  if(state.filterDate==='hoje'){const t=todayISO();orders=orders.filter(o=>o.prazo===t);}
  else if(state.filterDate==='amanha'){const t=new Date();t.setDate(t.getDate()+1);orders=orders.filter(o=>o.prazo===t.toISOString().split('T')[0]);}
  else if(state.filterDate.match(/^\d{4}-\d{2}-\d{2}$/)){orders=orders.filter(o=>o.prazo===state.filterDate);}
  if(state.search){const q=state.search.toLowerCase();orders=orders.filter(o=>(o.nome||'').toLowerCase().includes(q)||(o.telefone||'').includes(q)||(o.endereco||'').toLowerCase().includes(q));}
  return orders;
}

function getStats(orders){
  const valid=orders.filter(o=>o.statusPedido!=='Cancelado');
  const total=valid.reduce((s,o)=>s+(+o.valor||0),0);
  const paid=valid.filter(o=>o.statusPagamento==='Pago').reduce((s,o)=>s+(+o.valor||0),0);
  const pendentes=fmtBRL(valid.filter(o=>o.statusPagamento==='Pendente').reduce((s,o)=>s+(+o.valor||0),0));
  return {count:valid.length,qtdMarmitas:valid.reduce((s,o)=>s+(+o.quantidade||0),0),total,paid,pendentes};
}

// ── AI Import ─────────────────────────────────────────
async function processWhatsApp(text,customers){
  const dayNames=['domingo','segunda-feira','terça-feira','quarta-feira','quinta-feira','sexta-feira','sábado'];
  const todayName=dayNames[new Date().getDay()];
  const knownCtx=customers.slice(0,10).map(c=>({nome:c.nome,telefone:c.telefone,endereco:c.endereco}));
  const prompt=`Você é o sistema de pedidos da Dias de Marmita. Retorne APENAS JSON.\nABREV: P/P.=Purê(carbo),Strog=Strogonoff,Hamb=Hambúrguer Patinho,Carne moída=Patinho Moído,Ragu=Carne de Panela\nTAMANHO GLOBAL: "12M"=12 marmitas todas M\nPREÇOS: Frango/Vegetal(P19/M21.5/G23)|Carne(P22/M24/G26)|Suíno(P20/M22.5/G23.5)|Tilápia(P23.5/M25.5/G30)\nPRECIFICAÇÃO A(letra P/M/G): preço direto. B(gramas): 0-115g=P,116-165g=M,166-200g=G,>200g=G+R$3/50g\nCALDOS(ignorar P/M/G): Frango=23,Carne=25\nESCONDIDINHOS(carne): M=24,G=26\nCOMBOS(5 marmitas): Queridinhos(P105/M115/G125),Clássicos(P95/M105/G115),Bem-Estar(P100/M110/G120),Low Carb(P95/M105/G115),Energize-se(P100/M110/G120)\nADICIONAIS: Feijão+2,Lentilha+2.5,GrãoBico+2.5,Carbo>280g+2.5,Molho+3\nDESCONTOS: AMANDA ARAUJO=10%,MED/MEDICINA/AMANDA AYLA/LORENA/GIOVANA=5%\nCÁLCULO: pix=round(sub*(1-d%)*0.972,2)+ent|cartao=round(sub*(1-d%),2)+ent|Motoboy=8,Retirada=0\nData:${todayISO()} (${todayName})\nClientes:${JSON.stringify(knownCtx)}\nMensagem:\n"""\n${text}\n"""\nJSON:{"nome":"","telefone":"","endereco":"","complemento":"","prazo":"${todayISO()}","formaEntrega":"Motoboy","formaPagamento":"Pix","statusPagamento":"Pendente","statusConfirmacao":"Aguardando","quantidade":0,"valorCartao":0,"valorPix":0,"valor":0,"codigoDesconto":"","percentualDesconto":0,"obs":"","itens":[]}`;
  const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:4000,messages:[{role:'user',content:prompt}]})});
  const d=await r.json();
  const raw=d.content?.find(b=>b.type==='text')?.text||'';
  const m=raw.match(/\{[\s\S]*\}/);
  if(!m)throw new Error('IA não retornou JSON. Resposta: '+raw.slice(0,200));
  return JSON.parse(m[0]);
}

// ── Render Engine ─────────────────────────────────────
function h(tag,attrs={},children=[]){
  const el=document.createElement(tag);
  for(const[k,v]of Object.entries(attrs)){
    if(k==='class')el.className=v;
    else if(k.startsWith('on'))el[k.toLowerCase()]=v;
    else if(k==='style'&&typeof v==='object')Object.assign(el.style,v);
    else if(k==='checked'||k==='disabled')el[k]=v;
    else el.setAttribute(k,v);
  }
  for(const c of children){

function hHTML(tag,attrs,html){const el=h(tag,attrs);el.innerHTML=html;return el;}

function render(){
  const app=document.getElementById('app');

}

function buildApp(){
  const wrap=h('div',{style:{maxWidth:'700px',margin:'0 auto',padding:'0 1rem 5rem'}});

  wrap.appendChild(buildHeader());
  // nav
  wrap.appendChild(buildNav());

    return wrap;
  }
  // view
  const views={pedidos:buildPedidosView,clientes:buildClientesView,financeiro:buildFinanceiroView,estoque:buildEstoqueView};
  const viewFn=views[state.view]||buildPedidosView;
  wrap.appendChild(viewFn());
  // modals
  if(state.editing!==null)wrap.appendChild(buildOrderModal());
  if(state.showImport)wrap.appendChild(buildImportModal());
  if(state.showTemplates)wrap.appendChild(buildTemplatesModal());
  if(state.savingAsTemplate)wrap.appendChild(buildSaveTemplateModal());
  if(state.showDelivery)wrap.appendChild(buildDeliveryModal());
  if(state.showPendencias)wrap.appendChild(buildPendenciasModal());
  if(state.selectMode)wrap.appendChild(buildBulkBar());
  return wrap;
}

  if(hasData){
    const cpBtn=h('button',{style:{padding:'.35rem .7rem',borderRadius:'999px',border:'1px solid var(--border)',background:'var(--surface)',fontSize:'.75rem',fontWeight:'700',cursor:'pointer',display:'flex',alignItems:'center',gap:'.3rem',fontFamily:'inherit',color:'var(--muted)'}});
    cpBtn.innerHTML='📋 Copiar';
    cpBtn.onclick=async e=>{e.stopPropagation();
      const fmtKg=g=>(g/1000).toLocaleString('pt-BR',{minimumFractionDigits:1,maximumFractionDigits:2})+' kg';

      if(Object.keys(carbos).length){lines.push('🌾 Carboidratos');Object.entries(carbos).sort((a,b)=>b[1]-a[1]).forEach(([n,g])=>lines.push(`  ${n} — ${fmtKg(g)}`));lines.push('');}
      if(Object.keys(caldos).length){lines.push('🥣 Caldos');Object.entries(caldos).sort((a,b)=>b[1]-a[1]).forEach(([n,v])=>lines.push(`  ${n} — ${v} un.`));lines.push('');}
      if(Object.keys(especiais).length){lines.push('✨ Especiais');Object.entries(especiais).sort((a,b)=>b[1]-a[1]).forEach(([n,v])=>lines.push(`  ${n} — ${v} marmita${v!==1?'s':''}`));lines.push('');}
      await copyText(lines.join('\n'));cpBtn.innerHTML='✓ Copiado!';setTimeout(()=>{cpBtn.innerHTML='📋 Copiar';},2000);

  if(isOpen){
    const body=h('div',{style:{padding:'0 1rem 1rem',borderTop:'1px solid var(--border)'}});
    if(!hasData){body.innerHTML='<div class="empty" style="padding:1rem">Nenhum pedido com composição no filtro.</div>';}
    else{
      const grid=h('div',{style:{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(160px,1fr))',gap:'1rem',paddingTop:'.75rem'}});
      const fmtKg=g=>(g/1000).toLocaleString('pt-BR',{minimumFractionDigits:1,maximumFractionDigits:2})+' kg';
      const makeSection=(icon,lbl,data,fmt)=>{
        if(!Object.keys(data).length)return null;
        const d=h('div',{});
        d.innerHTML=`<div class="label" style="color:var(--yellow-deep);margin-bottom:.4rem">${icon} ${lbl}</div>`;

function aggregateProd(orders){
  const carbos={},proteinas={},caldos={},especiais={};let total=0;
  orders.forEach(o=>{if(!o.itens?.length)return;total++;o.itens.forEach(item=>{const q=+item.quantidade||1;
    if(item.combo){const k=`Combo ${item.combo.categoria} ${item.combo.tamanho}`;especiais[k]=(especiais[k]||0)+q;return;}
    if(item.tipo==='caldo'){const k=`Caldo de ${item.variante==='frango'?'Frango':'Carne'}`;caldos[k]=(caldos[k]||0)+q;return;}
    if(item.tipo==='escondidinho'){const k=`Escondidinho ${item.tamanho}`;especiais[k]=(especiais[k]||0)+q;return;}
    if(item.carbo?.nome&&!item.semCarbo){carbos[item.carbo.nome]=(carbos[item.carbo.nome]||0)+(+item.carbo.gramas||0)*q;}
    if(item.proteina?.nome){proteinas[item.proteina.nome]=(proteinas[item.proteina.nome]||0)+(+item.proteina.gramas||0)*q;}
    (item.adicionais||[]).forEach(a=>{if(a.nome)especiais[a.nome]=(especiais[a.nome]||0)+q;});
  });});
  return{carbos,proteinas,caldos,especiais,total};
}

  prevBtn.innerHTML='‹';prevBtn.onclick=()=>{const d=new Date(year,month-2,1);setState({_mes:d.toISOString().slice(0,7)});};
  const nextBtn=h('button',{class:'btn-icon',style:{width:'28px',height:'28px'}},'>');nextBtn.innerHTML='›';
  const isCurrentMonth=mesState===new Date().toISOString().slice(0,7);

  nextBtn.onclick=()=>{if(isCurrentMonth)return;const d=new Date(year,month,1);setState({_mes:d.toISOString().slice(0,7)});};
  monthNav.appendChild(prevBtn);monthNav.appendChild(hHTML('span',{class:'font-display',style:{fontSize:'.9rem',minWidth:'150px',textAlign:'center',textTransform:'capitalize'}},mesLabel));monthNav.appendChild(nextBtn);
  rightRow.appendChild(monthNav);titleRow.appendChild(rightRow);wrap.appendChild(titleRow);

  // P&L cards
  const pnlData=[['Faturamento',faturamento,true],['Caixa Real',caixaReal,false],['Despesas Var.',totalVar,false],['Despesas Fixas',totalFixo,false],['Lucro Bruto',lucroBruto,false],['Lucro Líquido',lucroLiquido,false]];
  const pnlGrid=h('div',{style:{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(130px,1fr))',gap:'.6rem',marginBottom:'1.5rem'}});
  pnlData.forEach(([lbl,val,hl])=>{
    const c=h('div',{class:'stat-card',style:hl?{background:'var(--yellow)',borderColor:'var(--yellow)'}:val<0?{background:'#F6D7D5'}:{}});
    c.innerHTML=`<div class="label" style="color:${hl?'rgba(31,36,32,.7)':'var(--muted)'}">${lbl}</div><div class="font-display" style="font-size:1.3rem;font-weight:700;margin-top:.25rem;color:${val<0?'#8B3A36':hl?'var(--dark)':'var(--text)'}">${fmtBRL(val)}</div>`;
    pnlGrid.appendChild(c);
  });
  wrap.appendChild(pnlGrid);

  // Despesas variáveis
  const despSection=h('div',{style:{marginBottom:'1.25rem'}});
  const despHeader=h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'.65rem'}});
  despHeader.innerHTML='<div class="label" style="margin:0">Despesas Variáveis</div>';

  addDespBtn.onclick=()=>setState({editingDespesa:{id:genId(),descricao:'',valor:'',categoria:(cfg.categorias||[])[0]||'Outros',data:todayISO()}});
  despHeader.appendChild(addDespBtn);despSection.appendChild(despHeader);
  if(monthDesp.length===0){despSection.appendChild(hHTML('div',{style:{fontSize:'.85rem',color:'var(--muted)',textAlign:'center',padding:'.75rem'}},'Nenhuma despesa neste mês.'));}
  else{
    const list=h('div',{style:{display:'grid',gap:'.35rem'}});
    monthDesp.forEach(d=>{
      const c=h('div',{class:'card',style:{display:'flex',alignItems:'center',gap:'.5rem',padding:'.55rem .85rem'}});
      c.innerHTML=`<div style="flex:1"><div style="font-weight:600;font-size:.88rem">${d.descricao}</div><div style="font-size:.72rem;color:var(--muted)">${d.categoria} · ${fmtDate(d.data)}</div></div><div style="font-weight:700">${fmtBRL(d.valor)}</div>`;
      const delBtn=h('button',{class:'btn-icon',style:{color:'#8B3A36'}});delBtn.innerHTML=icons.trash;
      delBtn.onclick=async()=>{if(!confirm('Excluir despesa?'))return;await del('despesas_var',`?id=eq.${d.id}`);setState(s=>({despesasVar:s.despesasVar.filter(x=>x.id!==d.id)}));};
      c.appendChild(delBtn);list.appendChild(c);

    despSection.appendChild(list);
  }
  wrap.appendChild(despSection);

  // modal despesa
  if(state.editingDespesa){
    const d=state.editingDespesa;
    const m=buildModal('Nova Despesa');
    const b=h('div',{class:'modal-body'});
    b.appendChild(h('label',{class:'label'},'Descrição'));const di=h('input',{type:'text',value:d.descricao,style:{marginBottom:'.65rem'}});di.oninput=e=>d.descricao=e.target.value;b.appendChild(di);
    b.appendChild(h('label',{class:'label'},'Valor'));const vi=h('input',{type:'number',value:d.valor,style:{marginBottom:'.65rem'}});vi.oninput=e=>d.valor=+e.target.value;b.appendChild(vi);
    b.appendChild(h('label',{class:'label'},'Categoria'));const ci=h('select',{style:{marginBottom:'.65rem'}});(cfg.categorias||[]).forEach(c=>ci.appendChild(h('option',{value:c},c)));ci.value=d.categoria;ci.oninput=e=>d.categoria=e.target.value;b.appendChild(ci);
    b.appendChild(h('label',{class:'label'},'Data'));const dti=h('input',{type:'date',value:d.data,style:{marginBottom:'1rem'}});dti.oninput=e=>d.data=e.target.value;b.appendChild(dti);

    const rb=h('div',{class:'modal-body'});
    const rows=[['Pedidos',monthOrders.length],['Marmitas',monthOrders.reduce((s,o)=>s+(+o.quantidade||0),0)],['Faturamento',fmtBRL(faturamento)],['Caixa Real',fmtBRL(caixaReal)],['Ticket Médio',fmtBRL(monthOrders.length?faturamento/monthOrders.length:0)],['Despesas Variáveis',fmtBRL(totalVar)],['Despesas Fixas',fmtBRL(totalFixo)],['Lucro Bruto',fmtBRL(lucroBruto)],['Lucro Líquido',fmtBRL(lucroLiquido)]];

    rb.appendChild(cpBtn);rm.appendChild(rb);wrap.appendChild(wrapModal(rm,()=>setState({_showRelatorio:false})));
  }
  return wrap;
}

// ── ESTOQUE VIEW ──────────────────────────────────────
const CATS=['Proteínas','Carbos','Legumes/Verduras','Temperos','Embalagens','Outros'];
const UNITS=['kg','g','L','ml','un','pct','cx'];
const eColor=i=>{const q=+i.quantidade||0,r=+i.limiteVermelho||0,a=+i.limiteAmarelo||0;return q<=r?'red':q<=a?'yellow':'green';};
const CS={green:{bg:'#E0EDD4',tx:'#2D5016',dot:'#4A8C2A',lb:'🟢 Bom'},yellow:{bg:'#FBF0C5',tx:'#7A5A10',dot:'#C49A20',lb:'🟡 Quase'},red:{bg:'#F6D7D5',tx:'#8B3A36',dot:'#C4433F',lb:'🔴 Comprar'}};

function buildEstoqueView(){
  const sub=state._estoqueSub||'estoque';

  [['estoque','📦 Estoque',vermelhos,'#C4433F','#fff'],['lista','🛒 Lista',pendLista,'var(--yellow)','var(--dark)']].forEach(([id,lbl,cnt,bg,tx])=>{
    const b=h('button',{class:`btn btn-ghost${sub===id?' active':''}`,onClick:()=>setState({_estoqueSub:id})});
    b.innerHTML=lbl+(cnt>0?` <span class="badge" style="background:${bg};color:${tx}">${cnt}</span>`:'');
    leftNav.appendChild(b);
  });
  subNav.appendChild(leftNav);
  wrap.appendChild(hHTML('h2',{class:'font-display',style:{fontSize:'1.8rem',fontWeight:'500',marginBottom:'1rem'}},sub==='estoque'?'📦 Estoque':'🛒 Lista de Compras'));

  if(sub==='estoque'){
    const rightRow=h('div',{style:{display:'flex',gap:'.4rem'}});
    if(alertas>0){const gb=h('button',{class:'btn btn-ghost',style:{fontSize:'.82rem'}});gb.innerHTML='🛒 Gerar lista ('+alertas+')';gb.onclick=async()=>{const als=state.estoque.filter(i=>eColor(i)!=='green');const exist=new Set(state.listaCompras.map(x=>x.nome.toLowerCase()));const novos=als.filter(i=>!exist.has(i.nome.toLowerCase())).map(i=>({id:genId(),nome:i.nome,quantidade:i.quantidadeAlvo>0?Math.max(0,i.quantidadeAlvo-i.quantidade).toFixed(1).replace(/\.0$/,''):'',unidade:i.unidade,categoria:i.categoria,checked:false}));for(const n of novos)await saveListaItem(n);setState({_estoqueSub:'lista'});};rightRow.appendChild(gb);}
    const addBtn=h('button',{class:'btn btn-yellow',style:{fontSize:'.82rem'}});addBtn.innerHTML=icons.plus+' Ingrediente';addBtn.onclick=()=>setState({_editEst:{}});rightRow.appendChild(addBtn);subNav.appendChild(rightRow);wrap.appendChild(subNav);

    if(state._editEst!==undefined&&state._editEst!==null){
      const it=state._editEst;let f={nome:'',unidade:'kg',quantidade:'',mediaUso:'',limiteAmarelo:'',limiteVermelho:'',quantidadeAlvo:'',categoria:'Proteínas',...it};
      const em=buildModal(f.id?'Editar estoque':'Novo ingrediente');
      const eb=h('div',{class:'modal-body'});
      const gr2=(a,b)=>{const g=h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'.5rem',marginBottom:'.6rem'}});g.appendChild(a);g.appendChild(b);return g;};
      const fld=(lbl,key,type='text',opts)=>{const w=h('div',{});w.appendChild(h('label',{class:'label'},lbl));if(opts){const s=h('select',{});opts.forEach(o=>s.appendChild(h('option',{value:o},o)));s.value=f[key]||opts[0];s.oninput=e=>f[key]=e.target.value;w.appendChild(s);}else{const i=h('input',{type,value:f[key]||''});i.oninput=e=>f[key]=e.target.value;w.appendChild(i);}return w;};
      eb.appendChild(gr2(fld('Nome','nome'),fld('Categoria','categoria','text',CATS)));
      const row3=h('div',{style:{display:'grid',gridTemplateColumns:'1fr 70px 1fr',gap:'.5rem',marginBottom:'.6rem'}});row3.appendChild(fld('Qtd atual','quantidade','number'));row3.appendChild(fld('Un.','unidade','text',UNITS));row3.appendChild(fld('Uso/dia','mediaUso','number'));eb.appendChild(row3);
      const lims=h('div',{style:{background:'var(--bg-warm)',borderRadius:'9px',padding:'.65rem',display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:'.5rem',marginBottom:'.6rem'}});
      const limFld=(lbl,key,col)=>{const w=h('div',{});w.appendChild(hHTML('div',{style:{fontSize:'.68rem',color:col,fontWeight:'700',marginBottom:'3px'}},lbl));const i=h('input',{type:'number',class:'input',value:f[key]||''});i.oninput=e=>f[key]=e.target.value;w.appendChild(i);return w;};
      lims.appendChild(limFld('🟡 Amarelo <','limiteAmarelo','#7A5A10'));lims.appendChild(limFld('🔴 Vermelho <','limiteVermelho','#8B3A36'));lims.appendChild(limFld('Alvo (repor)','quantidadeAlvo','var(--muted)'));eb.appendChild(lims);
      const ac=h('div',{style:{display:'flex',gap:'.5rem',justifyContent:'flex-end'}});
      ac.appendChild(h('button',{class:'btn btn-ghost',onClick:()=>setState({_editEst:null})},'Cancelar'));
      const sv=h('button',{class:'btn btn-yellow',onClick:async()=>{if(!f.nome.trim())return;await saveEstoque(f);setState({_editEst:null});}});sv.innerHTML=icons.check+' Salvar';ac.appendChild(sv);eb.appendChild(ac);em.appendChild(eb);
      wrap.appendChild(wrapModal(em,()=>setState({_editEst:null})));
    }

    if(state.estoque.length===0){wrap.appendChild(h('div',{class:'empty'},[h('div',{class:'empty-icon'},'📦'),h('div',{style:{fontWeight:'600'}},'Estoque vazio'),h('div',{style:{fontSize:'.85rem'}},'Adicione ingredientes para monitorar.')]));}
    else{
      const byCat={};state.estoque.forEach(i=>{if(!byCat[i.categoria])byCat[i.categoria]=[];byCat[i.categoria].push(i);});
      Object.entries(byCat).forEach(([cat,its])=>{
        wrap.appendChild(hHTML('div',{class:'label',style:{marginBottom:'.35rem'}},cat));
        const list=h('div',{style:{display:'grid',gap:'.35rem',marginBottom:'1rem'}});
        [...its].sort((a,b)=>{const o={red:0,yellow:1,green:2};return o[eColor(a)]-o[eColor(b)];}).forEach(item=>{
          const c=eColor(item),cs=CS[c];
          const dias=item.mediaUso>0?(item.quantidade/item.mediaUso).toFixed(1):null;
          const card=h('div',{class:'card',style:{display:'flex',alignItems:'center',gap:'.6rem',padding:'.6rem .85rem',borderLeft:`4px solid ${cs.dot}`}});
          card.innerHTML=`<div style="flex:1"><div style="font-weight:700;font-size:.88rem">${item.nome}</div><div style="font-size:.72rem;color:${cs.tx};margin-top:1px">${cs.lb}${dias?` · ~${dias} dias`:''}</div></div><div style="text-align:right"><div class="font-display" style="font-size:1.05rem;font-weight:700;color:${cs.tx}">${item.quantidade} <span style="font-size:.7rem;font-weight:500">${item.unidade}</span></div>${item.mediaUso>0?`<div style="font-size:.65rem;color:var(--muted-2)">${item.mediaUso}${item.unidade}/dia</div>`:''}</div>`;
          const editBtn=h('button',{class:'btn-icon',style:{padding:'.25rem'}});editBtn.innerHTML=icons.edit;editBtn.onclick=()=>setState({_editEst:{...item,mediaUso:item.media_uso||item.mediaUso,limiteAmarelo:item.limite_amarelo||item.limiteAmarelo,limiteVermelho:item.limite_vermelho||item.limiteVermelho,quantidadeAlvo:item.quantidade_alvo||item.quantidadeAlvo}});
          const delBtn=h('button',{class:'btn-icon',style:{color:'#8B3A36',padding:'.25rem'}});delBtn.innerHTML=icons.trash;delBtn.onclick=()=>deleteEstoque(item.id);
          card.appendChild(editBtn);card.appendChild(delBtn);list.appendChild(card);
        });
        wrap.appendChild(list);
      });
    }
  } else {
    // lista de compras
    const rightRow=h('div',{style:{display:'flex',gap:'.4rem'}});
    if(state.listaCompras.filter(i=>i.checked).length>0){const cb=h('button',{class:'btn btn-ghost',style:{fontSize:'.82rem'}},);cb.innerHTML='Limpar comprados';cb.onclick=clearListaComprada;rightRow.appendChild(cb);}
    if(pendLista>0){const cpb=h('button',{class:'btn btn-ghost',style:{fontSize:'.82rem'}});cpb.innerHTML='📋 Copiar';cpb.onclick=async()=>{const byCat={};state.listaCompras.filter(i=>!i.checked).forEach(i=>{if(!byCat[i.categoria])byCat[i.categoria]=[];byCat[i.categoria].push(i);});const lines=[`🛒 LISTA — ${new Date().toLocaleDateString('pt-BR')}\n`];Object.entries(byCat).forEach(([c,its])=>{lines.push(c);its.forEach(i=>lines.push(`  ☐ ${i.nome}${i.quantidade?' — '+i.quantidade+' '+i.unidade:''}`));lines.push('');});await copyText(lines.join('\n'));cpb.innerHTML='✓ Copiado!';setTimeout(()=>{cpb.innerHTML='📋 Copiar';},2000);};rightRow.appendChild(cpb);}
    subNav.appendChild(rightRow);wrap.appendChild(subNav);

    // add form
    let formNome='',formQtd='',formUnit='kg',formCat='Proteínas';
    const addForm=h('div',{class:'card',style:{marginBottom:'1rem'}});
    const fg=h('div',{style:{display:'grid',gridTemplateColumns:'1fr 70px 65px',gap:'.4rem',marginBottom:'.4rem'}});
    const ni=h('input',{type:'text',placeholder:'Nome do item'});ni.oninput=e=>formNome=e.target.value;ni.onkeydown=async e=>{if(e.key==='Enter'&&formNome.trim()){await saveListaItem({nome:formNome.trim(),quantidade:formQtd,unidade:formUnit,categoria:formCat});formNome='';ni.value='';qiEl.value='';}};
    const qiEl=h('input',{type:'number',placeholder:'Qtd'});qiEl.oninput=e=>formQtd=e.target.value;
    const uiEl=h('select',{});UNITS.forEach(u=>uiEl.appendChild(h('option',{value:u},u)));uiEl.oninput=e=>formUnit=e.target.value;
    fg.appendChild(ni);fg.appendChild(qiEl);fg.appendChild(uiEl);addForm.appendChild(fg);
    const fg2=h('div',{style:{display:'flex',gap:'.4rem'}});
    const catSel=h('select',{style:{flex:'1'}});CATS.forEach(c=>catSel.appendChild(h('option',{value:c},c)));catSel.oninput=e=>formCat=e.target.value;
    const addBtn=h('button',{class:'btn btn-yellow',style:{fontSize:'.82rem'}});addBtn.innerHTML=icons.plus+' Add';
    addBtn.onclick=async()=>{if(!formNome.trim())return;await saveListaItem({nome:formNome.trim(),quantidade:formQtd,unidade:formUnit,categoria:formCat});formNome='';ni.value='';qiEl.value='';};
    fg2.appendChild(catSel);fg2.appendChild(addBtn);addForm.appendChild(fg2);wrap.appendChild(addForm);

    if(state.listaCompras.length===0){wrap.appendChild(h('div',{class:'empty'},[h('div',{class:'empty-icon'},'🛒'),h('div',{style:{fontWeight:'600'}},'Lista vazia'),h('div',{style:{fontSize:'.85rem'}},'Adicione itens ou gere pelo estoque.')]));}
    else{
      const byCat={};state.listaCompras.forEach(i=>{if(!byCat[i.categoria])byCat[i.categoria]=[];byCat[i.categoria].push(i);});
      Object.entries(byCat).forEach(([cat,its])=>{
        wrap.appendChild(hHTML('div',{class:'label',style:{marginBottom:'.35rem'}},cat));
        const list=h('div',{style:{display:'grid',gap:'.3rem',marginBottom:'.85rem'}});
        its.forEach(item=>{
          const c=h('div',{class:'card',style:{display:'flex',alignItems:'center',gap:'.5rem',padding:'.55rem .8rem',opacity:item.checked?'.55':'1',transition:'all .15s',background:item.checked?'var(--bg-warm)':'var(--surface)'}});
          const chk=h('button',{style:{width:'20px',height:'20px',borderRadius:'5px',border:'2px solid',flexShrink:'0',display:'inline-flex',alignItems:'center',justifyContent:'center',cursor:'pointer',background:item.checked?'var(--dark)':'transparent',borderColor:item.checked?'var(--dark)':'var(--border-strong)',transition:'all .15s'}});
          if(item.checked)chk.innerHTML=icons.check.replace('width="16"','width="11"').replace('height="16"','height="11"').replace('currentColor','var(--yellow)');
          chk.onclick=()=>toggleListaItem(item.id);
          c.appendChild(chk);
          c.appendChild(hHTML('span',{style:{flex:'1',fontWeight:'600',textDecoration:item.checked?'line-through':'none',fontSize:'.85rem'}},item.nome));
          if(item.quantidade)c.appendChild(hHTML('span',{style:{fontSize:'.75rem',color:'var(--muted)'}},item.quantidade+' '+item.unidade));
          const db=h('button',{class:'btn-icon',style:{color:'#8B3A36',padding:'.2rem'}});db.innerHTML=icons.trash;db.onclick=()=>deleteListaItem(item.id);c.appendChild(db);
          list.appendChild(c);
        });
        wrap.appendChild(list);
      });
    }
  }
  return wrap;
}

// ── MODAL HELPERS ─────────────────────────────────────
function buildModal(title){
  const m=h('div',{class:'modal'});
  const mh=h('div',{class:'modal-header'});
  mh.appendChild(hHTML('h3',{class:'font-display',style:{fontSize:'1.2rem',fontWeight:'600',margin:'0'}},title));
  const xBtn=h('button',{class:'btn-icon'});xBtn.innerHTML=icons.x;xBtn.onclick=()=>{if(state.editing!==null)setState({editing:null});else if(state.showImport)setState({showImport:false});else if(state.showTemplates)setState({showTemplates:false});else if(state.savingAsTemplate)setState({savingAsTemplate:null});else if(state.showDelivery)setState({showDelivery:false});else if(state.showPendencias)setState({showPendencias:false});else if(state._showRelatorio)setState({_showRelatorio:false});else if(state._editEst!==null)setState({_editEst:null});else if(state.editingDespesa)setState({editingDespesa:null});};
  mh.appendChild(xBtn);m.appendChild(mh);
  return m;
}

function wrapModal(modal,onClose){
  const bg=h('div',{class:'modal-bg'});
  bg.onclick=e=>{if(e.target===bg){if(onClose)onClose();else{if(state.editing!==null)setState({editing:null});else if(state.showImport)setState({showImport:false});else if(state.showTemplates)setState({showTemplates:false});else if(state.savingAsTemplate)setState({savingAsTemplate:null});else if(state.showDelivery)setState({showDelivery:false});else if(state.showPendencias)setState({showPendencias:false});else if(state._showRelatorio)setState({_showRelatorio:false});else if(state._editEst!==null)setState({_editEst:null});else if(state.editingDespesa)setState({editingDespesa:null});}}};
  bg.appendChild(modal);
  return bg;
}
