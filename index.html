*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Manrope',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.font-display{font-family:'Fraunces',serif}
input,select,textarea{font-family:'Manrope',sans-serif;width:100%;padding:.55rem .85rem;border:1.5px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text);font-size:.9rem;outline:none;transition:border-color .15s}
input:focus,select:focus,textarea:focus{border-color:var(--yellow-deep)}
select{appearance:none;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%23807966' stroke-width='2'><polyline points='6 9 12 15 18 9'/></svg>");background-repeat:no-repeat;background-position:right .7rem center;padding-right:2rem}
textarea{resize:vertical;min-height:80px}
button{font-family:'Manrope',sans-serif;cursor:pointer;border:none;background:none}
.btn{display:inline-flex;align-items:center;gap:.4rem;padding:.55rem 1.1rem;border-radius:999px;font-weight:700;font-size:.85rem;transition:all .15s}
.btn-yellow{background:var(--yellow);color:var(--dark)}.btn-yellow:hover{background:var(--yellow-deep)}
.btn-ghost{background:transparent;border:1.5px solid var(--border);color:var(--muted)}.btn-ghost:hover,.btn-ghost.active{background:var(--bg-warm);color:var(--text);border-color:var(--border-strong)}
.btn-icon{width:32px;height:32px;border-radius:8px;display:inline-flex;align-items:center;justify-content:center;color:var(--muted);transition:all .15s}.btn-icon:hover{background:var(--bg-warm);color:var(--text)}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1rem}
.label{font-size:.7rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:.35rem}
.pill{display:inline-flex;align-items:center;gap:.25rem;padding:.2rem .65rem;border-radius:999px;font-size:.72rem;font-weight:700;border:1.5px solid transparent;cursor:pointer;transition:all .15s}
.modal-bg{position:fixed;inset:0;background:rgba(31,36,32,.45);z-index:50;display:flex;align-items:flex-end;justify-content:center}
@media(min-width:640px){.modal-bg{align-items:center;padding:1rem}}
.modal{background:var(--bg);border-radius:16px 16px 0 0;width:100%;max-width:560px;max-height:92vh;overflow-y:auto}
@media(min-width:640px){.modal{border-radius:16px}}
.modal-header{position:sticky;top:0;background:var(--bg);padding:1.1rem 1.25rem .75rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;z-index:5}
.modal-body{padding:1rem 1.25rem 2rem}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:.85rem 1rem}
.order-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1rem;transition:border-color .15s}
.order-card:hover{border-color:var(--border-strong)}
.empty{text-align:center;padding:3rem 1rem;color:var(--muted)}
.empty-icon{font-size:2.5rem;margin-bottom:.75rem}
.divider{height:1px;background:var(--border);margin:.75rem 0}
.badge{display:inline-flex;align-items:center;justify-content:center;min-width:18px;height:18px;padding:0 4px;border-radius:999px;font-size:.62rem;font-weight:700}

/* ── Bottom Nav ── */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--dark);display:flex;justify-content:space-around;align-items:center;padding:.4rem 0 calc(.4rem + env(safe-area-inset-bottom));z-index:40;border-top:1px solid rgba(255,255,255,.06);box-shadow:0 -4px 20px rgba(31,36,32,.25)}
.bnav-btn{display:flex;flex-direction:column;align-items:center;gap:2px;padding:.45rem .8rem;border-radius:10px;font-size:.58rem;font-weight:700;color:rgba(246,242,233,.38);background:transparent;border:none;cursor:pointer;transition:all .2s;min-width:58px;font-family:inherit;letter-spacing:.02em}
.bnav-btn .bni{font-size:1.25rem;line-height:1;transition:transform .2s}
.bnav-btn.active{color:var(--yellow)}.bnav-btn.active .bni{transform:scale(1.15)}
.bnav-btn:hover:not(.active){color:rgba(246,242,233,.65)}

/* ── Toast ── */
.toast-wrap{position:fixed;top:1rem;left:50%;transform:translateX(-50%);z-index:200;display:flex;flex-direction:column;gap:.4rem;pointer-events:none;width:90%;max-width:360px}
.toast{padding:.6rem 1rem;border-radius:10px;font-size:.83rem;font-weight:700;display:flex;align-items:center;gap:.5rem;animation:tIn .25s ease;box-shadow:0 4px 20px rgba(31,36,32,.18)}
.toast.ok{background:#E0EDD4;color:#2D5016}.toast.err{background:#F6D7D5;color:#8B3A36}.toast.inf{background:var(--yellow-soft);color:var(--dark)}
@keyframes tIn{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:translateY(0)}}
@keyframes tOut{to{opacity:0;transform:translateY(-10px)}}

/* ── Skeleton ── */
@keyframes shimmer{0%{background-position:-300px 0}100%{background-position:300px 0}}
.sk{background:linear-gradient(90deg,var(--border) 0%,var(--bg-warm) 50%,var(--border) 100%);background-size:600px 100%;animation:shimmer 1.6s infinite linear;border-radius:6px;display:block}

/* ── Swipe cards ── */
.swipe-wrap{position:relative;overflow:hidden;border-radius:var(--radius)}
.swipe-hint{position:absolute;top:0;bottom:0;width:72px;display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:700;transition:opacity .15s;pointer-events:none;opacity:0}
.swipe-hint.pay{left:0;background:#E0EDD4;color:#2D5016;border-radius:var(--radius) 0 0 var(--radius)}
.swipe-hint.del{right:0;background:#F6D7D5;color:#8B3A36;border-radius:0 var(--radius) var(--radius) 0}
.swipe-inner{transition:transform .2s;will-change:transform;background:var(--surface)}

/* ── Confirm modal ── */
.confirm-box{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:1.5rem;max-width:320px;width:90%;text-align:center}
.confirm-title{font-weight:700;font-size:1rem;margin-bottom:.5rem}
.confirm-msg{font-size:.85rem;color:var(--muted);margin-bottom:1.25rem;line-height:1.5}
.confirm-btns{display:flex;gap:.5rem;justify-content:center}

/* ── Spinner ── */
.spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--yellow-deep);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>

async function db(table, method='GET', body=null, query=''){
  const r = await fetch(`${SUPA_URL}/rest/v1/${table}${query}`,{method,headers:H,body:body?JSON.stringify(body):null});

function showToast(msg,type='ok',duration=2800){
  let wrap=document.getElementById('toast-wrap');
  if(!wrap){wrap=document.createElement('div');wrap.id='toast-wrap';wrap.className='toast-wrap';document.body.appendChild(wrap);}
  const t=document.createElement('div');
  t.className=`toast ${type}`;
  const icons={ok:'✓',err:'✗',inf:'ℹ'};
  t.innerHTML=`<span>${icons[type]||'✓'}</span><span>${msg}</span>`;
  wrap.appendChild(t);
  setTimeout(()=>{t.style.animation='tOut .25s ease forwards';setTimeout(()=>t.remove(),250);},duration);
}

function showConfirm(title,msg,onConfirm,confirmLabel='Excluir',danger=true){
  const bg=document.createElement('div');
  bg.className='modal-bg';bg.style.zIndex='300';bg.style.alignItems='center';bg.style.padding='1rem';
  const box=document.createElement('div');
  box.className='confirm-box';
  box.innerHTML=`<div class="confirm-title">${title}</div><div class="confirm-msg">${msg}</div>`;
  const btns=document.createElement('div');btns.className='confirm-btns';
  const cancel=document.createElement('button');cancel.className='btn btn-ghost';cancel.textContent='Cancelar';cancel.onclick=()=>bg.remove();
  const ok=document.createElement('button');
  ok.className='btn';ok.textContent=confirmLabel;
  ok.style.cssText=`background:${danger?'#8B3A36':'var(--yellow)'};color:${danger?'#fff':'var(--dark)'}`;
  ok.onclick=()=>{bg.remove();onConfirm();};
  btns.appendChild(cancel);btns.appendChild(ok);box.appendChild(btns);
  bg.appendChild(box);bg.onclick=e=>{if(e.target===bg)bg.remove();};
  document.body.appendChild(bg);
}

async function loadAll(){
  setState({loading:true});
  try{
    const [pedidos,meta,desp,cfg,tmpl,est,lista]=await Promise.all([
      get('pedidos','?order=created_at.desc&limit=500'),
      get('clientes_meta'),
      get('despesas_var','?order=data.desc'),
      get('financeiro_config','?id=eq.1'),
      get('templates','?order=created_at.desc'),
      get('estoque','?order=nome.asc'),
      get('lista_compras','?order=created_at.asc'),
    ]);
    setState({
      pedidos: pedidos.map(normalizePedido),
      clientesMeta: meta||[],
      despesasVar: desp||[],
      finConfig: cfg?.[0]?.config || state.finConfig,
      templates: tmpl||[],
      estoque: est||[],
      listaCompras: lista||[],
      loading:false,
    });
  }catch(e){console.error(e);setState({loading:false});}
}

function normalizePedido(p){
  return {
    id:p.id, nome:p.nome||'', telefone:p.telefone||'', endereco:p.endereco||'', complemento:p.complemento||'',
    quantidade:p.quantidade||1, valor:+p.valor||0, valorCartao:+p.valor_cartao||0, valorPix:+p.valor_pix||0,
    prazo:p.prazo||'', formaEntrega:p.forma_entrega||'Motoboy', formaPagamento:p.forma_pagamento||'Pix',
    statusConfirmacao:p.status_confirmacao||'Aguardando', statusPagamento:p.status_pagamento||'Pendente',
    statusPedido:p.status_pedido||'Confirmado', codigoDesconto:p.codigo_desconto||'',
    percentualDesconto:+p.percentual_desconto||0, obs:p.obs||'', itens:p.itens||[], createdAt:p.created_at,
  };
}

function toDb(o){
  return {
    id:o.id, nome:o.nome, telefone:o.telefone, endereco:o.endereco, complemento:o.complemento,
    quantidade:o.quantidade, valor:o.valor, valor_cartao:o.valorCartao, valor_pix:o.valorPix,
    prazo:o.prazo||null, forma_entrega:o.formaEntrega, forma_pagamento:o.formaPagamento,
    status_confirmacao:o.statusConfirmacao, status_pagamento:o.statusPagamento, status_pedido:o.statusPedido,
    codigo_desconto:o.codigoDesconto||null, percentual_desconto:o.percentualDesconto||0,
    obs:o.obs, itens:o.itens||[],
  };
}

async function savePedido(order){
  setState({saving:true});
  try{
    const existing = state.pedidos.find(p=>p.id===order.id);
    if(existing){
      await upd('pedidos',`?id=eq.${order.id}`,toDb(order));
    } else {
      await ins('pedidos',toDb(order));
    }
    await loadAll();
    showToast('Pedido salvo!','ok');
  }catch(e){showToast('Erro ao salvar: '+e.message,'err',4000);}
  setState({saving:false,editing:null});
}

async function deletePedido(id){
  showConfirm('Excluir pedido','Tem certeza? Esta ação não pode ser desfeita.',async()=>{
    await del('pedidos',`?id=eq.${id}`);
    setState(s=>({pedidos:s.pedidos.filter(p=>p.id!==id),editing:null}));
    showToast('Pedido excluído','inf');
  });
}

async function updateField(id,field,value){
  const fieldMap={statusConfirmacao:'status_confirmacao',statusPagamento:'status_pagamento',statusPedido:'status_pedido'};
  const dbField=fieldMap[field]||field;
  setState(s=>({pedidos:s.pedidos.map(p=>p.id===id?{...p,[field]:value}:p)}));
  try{await upd('pedidos',`?id=eq.${id}`,{[dbField]:value});}catch(e){console.error(e);}
}

async function bulkUpdate(field,value){
  const ids=[...state.selectedIds];
  const fieldMap={statusPedido:'status_pedido',statusPagamento:'status_pagamento'};
  const dbField=fieldMap[field]||field;
  setState(s=>({pedidos:s.pedidos.map(p=>ids.includes(p.id)?{...p,[field]:value}:p),selectedIds:new Set(),selectMode:false}));
  for(const id of ids){try{await upd('pedidos',`?id=eq.${id}`,{[dbField]:value});}catch(e){}}
}

async function saveEstoque(item){
  const row={id:item.id||genId(),nome:item.nome,unidade:item.unidade,quantidade:+item.quantidade||0,media_uso:+item.mediaUso||0,limite_amarelo:+item.limiteAmarelo||0,limite_vermelho:+item.limiteVermelho||0,quantidade_alvo:+item.quantidadeAlvo||0,categoria:item.categoria,updated_at:new Date().toISOString()};
  await upsert('estoque',row);

  await del('estoque',`?id=eq.${id}`);

async function saveListaItem(item){
  const row={id:item.id||genId(),nome:item.nome,quantidade:item.quantidade,unidade:item.unidade,categoria:item.categoria,checked:item.checked||false};
  await upsert('lista_compras',row);
  const exists=state.listaCompras.find(x=>x.id===row.id);
  setState(s=>({listaCompras:exists?s.listaCompras.map(x=>x.id===row.id?{...x,...row}:x):[...s.listaCompras,row]}));
}

async function toggleListaItem(id){
  const item=state.listaCompras.find(x=>x.id===id);
  if(!item)return;
  const checked=!item.checked;
  setState(s=>({listaCompras:s.listaCompras.map(x=>x.id===id?{...x,checked}:x)}));
  await upd('lista_compras',`?id=eq.${id}`,{checked});
}

async function deleteListaItem(id){
  await del('lista_compras',`?id=eq.${id}`);
  setState(s=>({listaCompras:s.listaCompras.filter(x=>x.id!==id)}));
}

async function clearListaComprada(){
  const checked=state.listaCompras.filter(x=>x.checked).map(x=>x.id);
  if(!checked.length)return;
  for(const id of checked)await del('lista_compras',`?id=eq.${id}`);
  setState(s=>({listaCompras:s.listaCompras.filter(x=>!x.checked)}));
}

// ── Filtered Orders ───────────────────────────────────
function getVisibleOrders(){
  let orders=[...state.pedidos];
  if(state.filterDate==='hoje'){const t=todayISO();orders=orders.filter(o=>o.prazo===t);}
  else if(state.filterDate==='amanha'){const t=new Date();t.setDate(t.getDate()+1);orders=orders.filter(o=>o.prazo===t.toISOString().split('T')[0]);}
  else if(state.filterDate.match(/^\d{4}-\d{2}-\d{2}$/)){orders=orders.filter(o=>o.prazo===state.filterDate);}
  if(state.search){const q=state.search.toLowerCase();orders=orders.filter(o=>(o.nome||'').toLowerCase().includes(q)||(o.telefone||'').includes(q)||(o.endereco||'').toLowerCase().includes(q));}
  return orders;
}

function getStats(orders){
  const valid=orders.filter(o=>o.statusPedido!=='Cancelado');
  const total=valid.reduce((s,o)=>s+(+o.valor||0),0);
  const paid=valid.filter(o=>o.statusPagamento==='Pago').reduce((s,o)=>s+(+o.valor||0),0);
  const pendentes=fmtBRL(valid.filter(o=>o.statusPagamento==='Pendente').reduce((s,o)=>s+(+o.valor||0),0));
  return {count:valid.length,qtdMarmitas:valid.reduce((s,o)=>s+(+o.quantidade||0),0),total,paid,pendentes};
}

        doc.setFontSize(8.5);doc.setFont('helvetica','normal');doc.setTextColor(31,36,32);
        const lines=doc.splitTextToSize(lbl,120);
        doc.text(lines[0],18,y);
        if(lines[1]){doc.setFontSize(7.5);doc.setTextColor(128,121,102);doc.text(lines[1],18,y+4);y+=4;}
        doc.setFontSize(8.5);doc.setTextColor(31,36,32);
        doc.text(String(+it.qtd||1),W-42,y,'center');
        doc.text(fmtR(preco),W-16,y,'right');
        y+=7;
      });
    } else {
      const descricao=ascii(order.obs||`${order.quantidade} marmita${order.quantidade!==1?'s':''} personalizada${order.quantidade!==1?'s':''}`);
      const linhas=doc.splitTextToSize(descricao,120);
      doc.setFontSize(9);doc.setFont('helvetica','bold');doc.setTextColor(31,36,32);
      doc.text(linhas[0],18,y);
      if(linhas[1]){doc.setFontSize(8);doc.setFont('helvetica','normal');doc.setTextColor(128,121,102);doc.text(linhas[1],18,y+4);y+=4;}
      doc.setFontSize(9);doc.setFont('helvetica','normal');doc.setTextColor(31,36,32);
      doc.text(String(order.quantidade||1),W-42,y,'center');
      doc.text(fmtR(order.valor),W-16,y,'right');
      y+=10;
    }

    // Totais
    doc.setDrawColor(229,222,206);doc.line(14,y,W-14,y);y+=6;
    doc.setFontSize(8.5);doc.setFont('helvetica','normal');doc.setTextColor(128,121,102);
    doc.text('Subtotal:',W-50,y,'right');doc.setTextColor(31,36,32);doc.text(fmtR(order.valor),W-16,y,'right');y+=5;
    doc.setTextColor(128,121,102);doc.text('Pagamento:',W-50,y,'right');doc.setTextColor(31,36,32);doc.text(ascii(order.formaPagamento)||'---',W-16,y,'right');y+=5;
    if(order.valorPix>0&&order.valorCartao>0){
      doc.setTextColor(128,121,102);doc.text('Valor Pix:',W-50,y,'right');
      doc.setTextColor(63,79,42);doc.setFont('helvetica','bold');doc.text(fmtR(order.valorPix),W-16,y,'right');y+=5;
      doc.setTextColor(128,121,102);doc.setFont('helvetica','normal');doc.text('Valor Cartao:',W-50,y,'right');
      doc.setTextColor(31,36,32);doc.text(fmtR(order.valorCartao),W-16,y,'right');y+=5;
    }
    y+=2;doc.setDrawColor(229,222,206);doc.line(100,y,W-14,y);y+=6;
    doc.setFontSize(11);doc.setFont('helvetica','bold');doc.setTextColor(31,36,32);
    doc.text('TOTAL PAGO:',W-52,y,'right');
    doc.setFontSize(14);doc.setTextColor(196,154,32);
    doc.text(fmtR(order.valor),W-16,y,'right');y+=12;
    if(order.statusPagamento){
      const sc=order.statusPagamento==='Pago'?[63,79,42]:[122,90,16];
      doc.setFontSize(8);doc.setFont('helvetica','bold');doc.setTextColor(...sc);
      doc.text(`Status: ${order.statusPagamento}`,14,y);
    }

    // Rodape
    doc.setFillColor(246,242,233);doc.rect(0,H-25,W,25,'F');
    doc.setFillColor(232,181,51);doc.rect(0,H-25,W,1.5,'F');
    doc.setFontSize(7.5);doc.setFont('helvetica','normal');doc.setTextColor(128,121,102);
    doc.text('Este comprovante atesta a realizacao da compra descrita acima.',W/2,H-17,'center');
    doc.text('Dias de Marmita LTDA  |  CNPJ: 55.712.462/0001-23  |  diasdemarmita1@gmail.com',W/2,H-12,'center');
    doc.text(`Emitido em ${fmtDate(todayISO())}  |  Ref: ${numPedido}`,W/2,H-7,'center');

    const nomeArq=ascii((order.nome||'pedido').split(' ')[0]).toLowerCase();
    doc.save(`comprovante-${nomeArq}-${numPedido}.pdf`);
    showToast('Comprovante gerado!','ok');
  }catch(e){
    console.error('Erro comprovante:',e);
    showToast('Erro ao gerar PDF: '+e.message,'err',5000);
  }
}

// ── Render Engine ─────────────────────────────────────
function h(tag,attrs={},children=[]){
  const el=document.createElement(tag);
  for(const[k,v]of Object.entries(attrs)){
    if(k==='class')el.className=v;
    else if(k.startsWith('on'))el[k.toLowerCase()]=v;
    else if(k==='style'&&typeof v==='object')Object.assign(el.style,v);
    else if(k==='checked'||k==='disabled')el[k]=v;
    else el.setAttribute(k,v);
  }
  for(const c of children){
    if(c==null||c===false)continue;
    el.appendChild(typeof c==='string'?document.createTextNode(c):c);
  }
  return el;
}
function hHTML(tag,attrs,html){const el=h(tag,attrs);el.innerHTML=html;return el;}

function render(){
  const app=document.getElementById('app');
  app.innerHTML='';
  // remove old bottom nav if exists
  const oldNav=document.querySelector('.bottom-nav');
  if(oldNav)oldNav.remove();
  app.appendChild(buildApp());
}

function buildApp(){
  const wrap=h('div',{style:{maxWidth:'700px',margin:'0 auto',padding:'0 1rem 6rem'}});
  // header
  wrap.appendChild(buildHeader());
  if(state.loading){
    wrap.appendChild(buildSkeleton());
    const nav=buildNav();document.body.appendChild(nav);
    return wrap;
  }
  // view
  const views={pedidos:buildPedidosView,clientes:buildClientesView,financeiro:buildFinanceiroView,estoque:buildEstoqueView};
  const viewFn=views[state.view]||buildPedidosView;
  wrap.appendChild(viewFn());
  // modals
  if(state.editing!==null)wrap.appendChild(buildOrderModal());
  if(state.showImport)wrap.appendChild(buildImportModal());
  if(state.showTemplates)wrap.appendChild(buildTemplatesModal());
  if(state.savingAsTemplate)wrap.appendChild(buildSaveTemplateModal());
  if(state.showDelivery)wrap.appendChild(buildDeliveryModal());
  if(state.showPendencias)wrap.appendChild(buildPendenciasModal());
  if(state.selectMode)wrap.appendChild(buildBulkBar());
  // bottom nav (appended to body to stay fixed)
  const nav=buildNav();document.body.appendChild(nav);
  return wrap;
}

function buildSkeleton(){
  const wrap=h('div',{style:{marginTop:'1.5rem'}});
  // stat cards skeleton
  const grid=h('div',{style:{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:'.6rem',marginBottom:'1.25rem'}});
  for(let i=0;i<4;i++){const c=h('div',{class:'stat-card'});c.innerHTML=`<span class="sk" style="width:60%;height:10px;margin-bottom:6px"></span><span class="sk" style="width:80%;height:20px"></span>`;grid.appendChild(c);}
  wrap.appendChild(grid);
  // order card skeletons
  for(let i=0;i<3;i++){
    const c=h('div',{class:'order-card',style:{marginBottom:'.65rem'}});
    c.innerHTML=`<div style="display:flex;justify-content:space-between;margin-bottom:8px"><span class="sk" style="width:140px;height:15px"></span><span class="sk" style="width:55px;height:15px"></span></div>
      <span class="sk" style="width:180px;height:11px;display:block;margin-bottom:12px"></span>
      <div style="height:1px;background:var(--border);margin-bottom:8px"></div>
      <div style="display:flex;gap:6px"><span class="sk" style="width:75px;height:22px;border-radius:999px"></span><span class="sk" style="width:95px;height:22px;border-radius:999px"></span><span class="sk" style="width:70px;height:22px;border-radius:999px"></span></div>`;
    wrap.appendChild(c);
  }
  return wrap;
}

function buildNav(){
  const tabs=[['pedidos','📦','Pedidos'],['clientes','👥','Clientes'],['financeiro','💼','Financeiro'],['estoque','🛒','Compras']];
  const nav=h('div',{class:'bottom-nav'});
  tabs.forEach(([id,icon,label])=>{
    const btn=h('button',{class:`bnav-btn${state.view===id?' active':''}`,onClick:()=>setState({view:id})});
    btn.innerHTML=`<span class="bni">${icon}</span><span>${label}</span>`;
    nav.appendChild(btn);
  });
  return nav;
}

// ── PEDIDOS VIEW ──────────────────────────────────────
function buildPedidosView(){
  const visible=getVisibleOrders();
  const stats=getStats(visible);
  const wrap=h('div',{});
  // title row
  const titleRow=h('div',{style:{display:'flex',gap:'.5rem',alignItems:'center',marginBottom:'1rem',flexWrap:'wrap'}});
  const titleBtns=h('div',{style:{display:'flex',gap:'.4rem',marginLeft:'auto',flexWrap:'wrap'}});
  const importBtn=h('button',{class:'btn btn-ghost',onClick:()=>setState({showImport:true})});
  importBtn.innerHTML=icons.msg+' WhatsApp';
  const templBtn=h('button',{class:'btn btn-ghost',onClick:()=>setState({showTemplates:true})});
  const tCount=state.templates.length;
  templBtn.innerHTML='⚡ Templates'+(tCount>0?` <span class="badge" style="background:var(--yellow);color:var(--dark)">${tCount}</span>`:'');
  const newBtn=h('button',{class:'btn btn-yellow',onClick:()=>setState({editing:{id:genId(),nome:'',telefone:'',endereco:'',complemento:'',quantidade:1,valor:0,valorCartao:0,valorPix:0,prazo:todayISO(),formaEntrega:'Motoboy',formaPagamento:'Pix',statusConfirmacao:'Aguardando',statusPagamento:'Pendente',statusPedido:'Confirmado',codigoDesconto:'',percentualDesconto:0,obs:'',itens:[]}})});
  newBtn.innerHTML=icons.plus+' Novo pedido';
  titleBtns.appendChild(importBtn);titleBtns.appendChild(templBtn);titleBtns.appendChild(newBtn);
  titleRow.appendChild(hHTML('h2',{class:'font-display',style:{fontSize:'1.8rem',fontWeight:'500'}},'Pedidos'));
  titleRow.appendChild(titleBtns);
  wrap.appendChild(titleRow);
  // stats
  const statsGrid=h('div',{style:{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(130px,1fr))',gap:'.6rem',marginBottom:'1.25rem'}});
  const makeStatCard=(label,val,highlight,clickable)=>{

  pillRow.appendChild(makePill(CONF_STATUS,order.statusConfirmacao,'statusConfirmacao'));

    const valor=order.valorPix||order.valor||0;

    waBtn.innerHTML='💬 Confirmar';
    pillRow.appendChild(waBtn);
  }
  card.appendChild(pillRow);

  // swipe
  inner.appendChild(card);wrap.appendChild(inner);
  if(!state.selectMode){
    let tx=0,startX=0,startY=0,dragging=false,axis=null;
    const THRESHOLD=80;
    inner.addEventListener('touchstart',e=>{startX=e.touches[0].clientX;startY=e.touches[0].clientY;dragging=true;axis=null;},{passive:true});
    inner.addEventListener('touchmove',e=>{
      if(!dragging)return;
      const dx=e.touches[0].clientX-startX,dy=e.touches[0].clientY-startY;
      if(!axis)axis=Math.abs(dx)>Math.abs(dy)?'x':'y';
      if(axis==='y')return;
      tx=Math.max(-THRESHOLD*1.2,Math.min(THRESHOLD*1.2,dx));
      inner.style.transition='none';inner.style.transform=`translateX(${tx}px)`;
      const pct=Math.min(1,Math.abs(tx)/THRESHOLD);
      if(tx>0){payHint.style.opacity=pct;delHint.style.opacity=0;}
      else{delHint.style.opacity=pct;payHint.style.opacity=0;}
    },{passive:true});
    inner.addEventListener('touchend',()=>{
      if(!dragging||axis!=='x'){dragging=false;return;}
      dragging=false;axis=null;
      inner.style.transition='';inner.style.transform='';
      payHint.style.opacity=0;delHint.style.opacity=0;
      if(tx>THRESHOLD&&order.statusPagamento!=='Pago'){updateField(order.id,'statusPagamento','Pago');showToast('Marcado como Pago 💚','ok');}
      else if(tx<-THRESHOLD){deletePedido(order.id);}
      tx=0;
    });
  }
  return wrap;
}

function itemPreco(it){
  if(it.tipo==='caldo')return it.variante==='frango'?23:25;
  if(it.tipo==='escondidinho')return it.tamanho==='M'?24:26;
  if(it.tipo==='combo')return(COMBO_P[it.combo]||{})[it.tamanho]||0;
  const cat=PROT.find(p=>p.n===it.proteina)?.c||'frango';
  const base=PP[cat]||PP.frango;
  let preco=0;
  if(it.tamanho==='custom'&&it.gramas){
    const g=+it.gramas;
    if(g<=115)preco=base.P;
    else if(g<=165)preco=base.M;
    else if(g<=200)preco=base.G;
    else preco=base.G+Math.ceil((g-200)/50)*3;
  } else {
    preco=base[it.tamanho||'P']||0;
  }
  (it.adicionais||[]).forEach(a=>preco+=a.p||0);
  return preco;
}

function itemLabel(it){
  if(it.tipo==='caldo')return`Caldo de ${it.variante==='frango'?'Frango':'Carne'}`;
  if(it.tipo==='escondidinho')return`Escondidinho de ${it.escondSabor||'Carne'} ${it.tamanho}`;
  if(it.tipo==='combo'){const cb=COMBO_LIST.find(c=>c.k===it.combo);return`Combo ${cb?cb.n:it.combo} ${it.tamanho}`;}
  const tamLabel=it.tamanho==='custom'&&it.gramas?`${it.gramas}g`:it.tamanho;
  const adds=(it.adicionais||[]).map(a=>a.n).join(', ');
  return`${tamLabel} ${it.proteina||''}${!it.semCarbo&&it.carbo?' + '+it.carbo:''}${adds?' + '+adds:''}`;
}

  // Header with step indicator
  const mHeader=h('div',{class:'modal-header'});
  const headerTitle=hHTML('div',{});
  const xBtn=h('button',{class:'btn-icon'});xBtn.innerHTML=icons.x;xBtn.onclick=()=>setState({editing:null});
  mHeader.appendChild(headerTitle);mHeader.appendChild(xBtn);
  modal.appendChild(mHeader);

  const body=h('div',{class:'modal-body'});
  modal.appendChild(body);
  modal.appendChild(totalBarEl);

  // ── RENDER STEP ──
  const renderStep=()=>{
    body.innerHTML='';
    totalBarEl.style.display=step===2?'flex':'none';

    if(step===1){
      // Header
      headerTitle.innerHTML=`<div style="font-family:inherit"><div style="font-size:.7rem;font-weight:700;color:var(--muted);letter-spacing:.08em;text-transform:uppercase">Passo 1 de 2</div><div style="font-size:1.1rem;font-weight:700;margin-top:1px">👤 Cliente</div></div>`;

      // Nome com busca
      const nomeWrap=h('div',{style:{marginBottom:'.7rem',position:'relative'}});
      nomeWrap.appendChild(h('label',{class:'label'},'Nome do cliente'));
      const nomeInput=h('input',{type:'text',placeholder:'Digite o nome ou telefone...',value:o.nome||''});
      const suggestions=h('div',{style:{position:'fixed',background:'var(--surface)',border:'1px solid var(--border)',borderRadius:'10px',boxShadow:'0 4px 16px rgba(31,36,32,.12)',zIndex:'400',display:'none',maxHeight:'180px',overflowY:'auto',minWidth:'260px'}});

      const clienteMap={};
      state.pedidos.forEach(p=>{
        if(!p.telefone&&!p.nome)return;
        const k=p.telefone||p.nome;
        if(!clienteMap[k]||new Date(p.createdAt)>new Date(clienteMap[k].createdAt))
          clienteMap[k]={nome:p.nome,telefone:p.telefone,endereco:p.endereco,complemento:p.complemento,createdAt:p.createdAt};
      });
      const clientes=Object.values(clienteMap).sort((a,b)=>(a.nome||'').localeCompare(b.nome||''));

      const showSugg=(q)=>{
        const term=q.toLowerCase().trim();
        if(!term){suggestions.style.display='none';return;}
        const matched=clientes.filter(c=>(c.nome||'').toLowerCase().includes(term)||(c.telefone||'').includes(term)).slice(0,6);
        if(!matched.length){suggestions.style.display='none';return;}
        suggestions.innerHTML='';
        matched.forEach(c=>{
          const item=h('div',{style:{padding:'.55rem .85rem',cursor:'pointer',borderBottom:'1px solid var(--border)',display:'flex',justifyContent:'space-between',alignItems:'center'}});
          item.innerHTML=`<div><div style="font-weight:700;font-size:.85rem">${c.nome||'—'}</div>${c.telefone?`<div style="font-size:.7rem;color:var(--muted)">${fmtPhone(c.telefone)}</div>`:''}</div>`;
          item.onmouseenter=()=>item.style.background='var(--bg-warm)';
          item.onmouseleave=()=>item.style.background='transparent';
          item.onmousedown=e=>{
            e.preventDefault();
            o.nome=c.nome||'';o.telefone=c.telefone||'';o.endereco=c.endereco||'';o.complemento=c.complemento||'';
            nomeInput.value=c.nome||'';
            if(telInputEl)telInputEl.value=fmtPhone(c.telefone)||'';
            if(endInputEl)endInputEl.value=c.endereco||'';
            if(compInputEl)compInputEl.value=c.complemento||'';
            suggestions.style.display='none';
            showToast('Cliente preenchido ✓','ok',2000);
          };
          suggestions.appendChild(item);
        });
        const rect=nomeInput.getBoundingClientRect();
        suggestions.style.top=(rect.bottom+2)+'px';
        suggestions.style.left=rect.left+'px';
        suggestions.style.width=rect.width+'px';
        suggestions.style.display='block';
        document.body.appendChild(suggestions);
      };
      nomeInput.oninput=e=>{o.nome=e.target.value;showSugg(e.target.value);};
      nomeInput.onfocus=e=>{if(e.target.value)showSugg(e.target.value);};
      nomeInput.onblur=()=>setTimeout(()=>{suggestions.style.display='none';},150);
      nomeWrap.appendChild(nomeInput);body.appendChild(nomeWrap);

      // Telefone
      const telWrap=h('div',{style:{marginBottom:'.7rem'}});
      telWrap.appendChild(h('label',{class:'label'},'Telefone'));
      const telInputEl=h('input',{type:'tel',placeholder:'(44) 99999-9999',maxlength:'15',value:fmtPhone(o.telefone)||''});
      telInputEl.oninput=e=>{let v=e.target.value.replace(/\D/g,'').slice(0,11);let fmt='';if(v.length>0)fmt='('+v.slice(0,2);if(v.length>2)fmt+=') '+v.slice(2,7);if(v.length>7)fmt+='-'+v.slice(7,11);e.target.value=fmt;o.telefone=v;};
      telWrap.appendChild(telInputEl);body.appendChild(telWrap);

      // CEP
      const cepWrap=h('div',{style:{marginBottom:'.7rem'}});
      cepWrap.appendChild(h('label',{class:'label'},'CEP'));
      const cepRow=h('div',{style:{display:'flex',gap:'.4rem',alignItems:'center'}});
      const cepInput=h('input',{type:'text',placeholder:'00000-000',maxlength:'9',value:o.cep||'',style:{flex:'1'}});
      const cepStatus=h('span',{style:{fontSize:'.75rem',color:'var(--muted)',flexShrink:'0',minWidth:'65px'}});
      cepInput.oninput=e=>{
        let v=e.target.value.replace(/\D/g,'').slice(0,8);
        e.target.value=v.length>5?v.slice(0,5)+'-'+v.slice(5):v;o.cep=v;
        if(v.length===8){
          cepStatus.textContent='Buscando...';cepStatus.style.color='var(--muted)';
          fetch(`https://viacep.com.br/ws/${v}/json/`).then(r=>r.json()).then(d=>{
            if(d.erro){cepStatus.textContent='CEP inválido';cepStatus.style.color='#8B3A36';return;}
            const end=`${d.logradouro}, ${d.bairro} — ${d.localidade}/${d.uf}`;
            o.endereco=end;if(endInputEl)endInputEl.value=end;
            cepStatus.textContent='✓ Encontrado';cepStatus.style.color='#3F4F2A';
            if(compInputEl)compInputEl.focus();
          }).catch(()=>{cepStatus.textContent='Erro';cepStatus.style.color='#8B3A36';});
        } else cepStatus.textContent='';
      };
      cepRow.appendChild(cepInput);cepRow.appendChild(cepStatus);
      cepWrap.appendChild(cepRow);body.appendChild(cepWrap);

      // Endereço
      const endWrap=h('div',{style:{marginBottom:'.7rem'}});
      endWrap.appendChild(h('label',{class:'label'},'Endereço completo'));
      const endInputEl=h('input',{type:'text',placeholder:'Preenchido pelo CEP ou manual',value:o.endereco||''});
      endInputEl.oninput=e=>o.endereco=e.target.value;
      endWrap.appendChild(endInputEl);body.appendChild(endWrap);

      // Complemento
      const compWrap=h('div',{style:{marginBottom:'.7rem'}});
      compWrap.appendChild(h('label',{class:'label'},'Número / Complemento'));
      const compInputEl=h('input',{type:'text',placeholder:'Ex: 142, Apto 3',value:o.complemento||''});
      compInputEl.oninput=e=>o.complemento=e.target.value;
      compWrap.appendChild(compInputEl);body.appendChild(compWrap);

      // Prazo + Entrega
      body.appendChild(grid2(f2('Prazo','prazo','date'),f2('Entrega','formaEntrega','text',['Motoboy','Retirada'])));
      // Pagamento + Status confirmação
      body.appendChild(grid2(f2('Pagamento','formaPagamento','text',['Pix','Cartão','Dinheiro','Alelo','Coopcerto','VR']),f2('Confirmação','statusConfirmacao','text',['Aguardando','Confirmado','Recusado'])));
      // Status pagamento + Desconto
      body.appendChild(grid2(f2('Status Pgto','statusPagamento','text',['Pendente','Pago']),f2('Desconto %','percentualDesconto','number')));

      // Footer step 1
      const foot1=h('div',{style:{display:'flex',gap:'.5rem',alignItems:'center',marginTop:'.75rem'}});
      if(!isNew){const db=h('button',{class:'btn-icon',style:{color:'#8B3A36'}});db.innerHTML=icons.trash;db.onclick=()=>deletePedido(o.id);foot1.appendChild(db);}
      foot1.appendChild(h('button',{class:'btn btn-ghost',style:{marginLeft:'auto'},onClick:()=>setState({editing:null})},'Cancelar'));
      const nextBtn=h('button',{class:'btn btn-yellow',onClick:()=>{step=2;renderStep();}});
      nextBtn.innerHTML='Pedido →';
      foot1.appendChild(nextBtn);
      body.appendChild(foot1);

    } else {
      // ── STEP 2: PEDIDO ──
      headerTitle.innerHTML=`<div><div style="font-size:.7rem;font-weight:700;color:var(--muted);letter-spacing:.08em;text-transform:uppercase">Passo 2 de 2</div><div style="font-size:1.1rem;font-weight:700;margin-top:1px">🍱 ${o.nome||'Pedido'}</div></div>`;

      body.appendChild(h('div',{style:{height:'1px',background:'var(--border)',marginBottom:'.85rem'}}));

      // ── ITEM LIST ──
      const renderItems=()=>{
        itemsSection.innerHTML='';
        itemsSection.appendChild(hHTML('label',{class:'label'},'Itens'));
        if(o.itens.length>0){
          const list=h('div',{style:{display:'grid',gap:'.35rem',marginBottom:'.6rem'}});
          o.itens.forEach((it,idx)=>{
            const row=h('div',{style:{display:'flex',alignItems:'center',gap:'.5rem',padding:'.45rem .75rem',background:'var(--bg-warm)',border:'1px solid var(--border)',borderRadius:'8px'}});
            const qtdBadge=it.qtd>1?` ×${it.qtd}`:'';
            row.innerHTML=`<span style="flex:1;font-size:.82rem;font-weight:600">${itemLabel(it)}${qtdBadge}</span><span style="font-size:.82rem;font-weight:700;color:var(--muted)">${fmtBRL(itemPreco(it)*(+it.qtd||1))}</span>`;
            const del=h('button',{class:'btn-icon',style:{color:'#8B3A36',padding:'.2rem',flexShrink:'0'}});del.innerHTML=icons.trash;
            del.onclick=()=>{o.itens.splice(idx,1);recalcOrder(o);renderItems();renderTotais();renderTotalBar();};
            row.appendChild(del);list.appendChild(row);
          });
          itemsSection.appendChild(list);
        }

        // Tipo tabs
        const tipoRow=h('div',{style:{display:'flex',gap:'.3rem',marginBottom:'.6rem',flexWrap:'wrap'}});
        [['marmita','🍱 Marmita'],['caldo','🥣 Caldo'],['escondidinho','🥘 Escondidinho'],['combo','⚡ Combo']].forEach(([tipo,lbl])=>{
          const btn=h('button',{style:{padding:'.4rem .75rem',borderRadius:'999px',border:`1.5px solid ${itipoAtivo===tipo?'var(--dark)':'var(--border)'}`,background:itipoAtivo===tipo?'var(--dark)':'transparent',color:itipoAtivo===tipo?'var(--yellow)':'var(--muted)',fontSize:'.75rem',fontWeight:'700',cursor:'pointer',fontFamily:'inherit'}},lbl);
          btn.onclick=()=>{itipoAtivo=tipo;renderItems();};
          tipoRow.appendChild(btn);
        });
        itemsSection.appendChild(tipoRow);

        const formWrap=h('div',{style:{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:'10px',padding:'.75rem'}});

        if(itipoAtivo==='marmita'){
          // Proteína
          formWrap.appendChild(hHTML('div',{class:'label'},'Proteína'));
          const ps=h('select',{style:{marginBottom:'.5rem'}});
          PROT.forEach(p=>{const op=h('option',{value:p.n},p.n);if(p.n===iForm.proteina)op.selected=true;ps.appendChild(op);});
          ps.oninput=e=>iForm.proteina=e.target.value;
          formWrap.appendChild(ps);

          // Tamanho P/M/G + Personalizado
          formWrap.appendChild(hHTML('div',{class:'label'},'Tamanho'));
          const tamRow=h('div',{style:{display:'flex',gap:'.35rem',marginBottom:'.35rem',flexWrap:'wrap'}});
          [...['P','M','G'].map(t=>({t,lbl:t})),{t:'custom',lbl:'📏 g'}].forEach(({t,lbl})=>{
            const btn=h('button',{style:{flex:'1',padding:'.45rem',borderRadius:'8px',border:`1.5px solid ${iForm.tamanho===t?'var(--dark)':'var(--border)'}`,background:iForm.tamanho===t?'var(--dark)':'transparent',color:iForm.tamanho===t?'var(--yellow)':'var(--muted)',fontWeight:'700',cursor:'pointer',fontFamily:'inherit',fontSize:'.85rem'}},lbl);
            btn.onclick=()=>{iForm.tamanho=t;renderItems();};
            tamRow.appendChild(btn);
          });
          formWrap.appendChild(tamRow);
          if(iForm.tamanho==='custom'){
            const gramRow=h('div',{style:{display:'flex',gap:'.5rem',alignItems:'center',marginBottom:'.5rem'}});
            const gInput=h('input',{type:'number',inputmode:'numeric',min:'50',max:'500',step:'5',placeholder:'Ex: 220',value:iForm.gramas||'',style:{width:'100px',textAlign:'right'}});
            gInput.oninput=e=>{iForm.gramas=e.target.value;updatePreview();};
            gramRow.appendChild(gInput);
            gramRow.appendChild(hHTML('span',{style:{fontSize:'.82rem',color:'var(--muted)'}},'gramas'));
            // Mostra que faixa é
            if(iForm.gramas){
              const g=+iForm.gramas;
              const faixa=g<=115?'P':g<=165?'M':g<=200?'G':'G + extra';
              gramRow.appendChild(hHTML('span',{style:{fontSize:'.72rem',color:'var(--yellow-deep)',fontWeight:'700',marginLeft:'auto'}},`Faixa: ${faixa}`));
            }
            formWrap.appendChild(gramRow);
          }

          // Carbo
          formWrap.appendChild(hHTML('div',{class:'label'},'Carbo'));
          const csRow=h('div',{style:{display:'flex',gap:'.35rem',marginBottom:'.5rem',flexWrap:'wrap'}});
          [...CARBO_LIST,'Sem carbo'].forEach(c=>{
            const ativo=iForm.semCarbo?c==='Sem carbo':iForm.carbo===c;
            const btn=h('button',{style:{padding:'.3rem .6rem',borderRadius:'999px',border:`1.5px solid ${ativo?'var(--yellow-deep)':'var(--border)'}`,background:ativo?'var(--yellow-soft)':'transparent',color:ativo?'var(--dark)':'var(--muted)',fontSize:'.72rem',fontWeight:'700',cursor:'pointer',fontFamily:'inherit'}},c);
            btn.onclick=()=>{if(c==='Sem carbo'){iForm.semCarbo=true;}else{iForm.semCarbo=false;iForm.carbo=c;}renderItems();};
            csRow.appendChild(btn);
          });
          formWrap.appendChild(csRow);

          // Adicionais
          formWrap.appendChild(hHTML('div',{class:'label'},'Adicionais'));
          const addRow2=h('div',{style:{display:'flex',gap:'.35rem',flexWrap:'wrap',marginBottom:'.5rem'}});
          ADD_LIST.forEach(a=>{
            const ativo=iForm.adicionais.some(x=>x.n===a.n);
            const btn=h('button',{style:{padding:'.3rem .6rem',borderRadius:'999px',border:`1.5px solid ${ativo?'var(--yellow-deep)':'var(--border)'}`,background:ativo?'var(--yellow-soft)':'transparent',color:ativo?'var(--dark)':'var(--muted)',fontSize:'.72rem',fontWeight:'700',cursor:'pointer',fontFamily:'inherit'}},`${a.n} +${fmtBRL(a.p)}`);
            btn.onclick=()=>{if(ativo)iForm.adicionais=iForm.adicionais.filter(x=>x.n!==a.n);else iForm.adicionais.push(a);renderItems();};
            addRow2.appendChild(btn);
          });
          formWrap.appendChild(addRow2);

        } else if(itipoAtivo==='caldo'){
          formWrap.appendChild(hHTML('div',{class:'label'},'Sabor'));
          const varRow=h('div',{style:{display:'flex',gap:'.5rem',marginBottom:'.5rem'}});
          [{k:'frango',lbl:'Frango R$23'},{k:'carne',lbl:'Carne R$25'}].forEach(({k,lbl})=>{
            const btn=h('button',{style:{flex:'1',padding:'.5rem',borderRadius:'8px',border:`1.5px solid ${iForm.variante===k?'var(--dark)':'var(--border)'}`,background:iForm.variante===k?'var(--dark)':'transparent',color:iForm.variante===k?'var(--yellow)':'var(--muted)',fontWeight:'700',cursor:'pointer',fontFamily:'inherit',fontSize:'.82rem'}},lbl);
            btn.onclick=()=>{iForm.variante=k;renderItems();};
            varRow.appendChild(btn);
          });
          formWrap.appendChild(varRow);

        } else if(itipoAtivo==='escondidinho'){
          const ESCOND_SABORES=['Estrogonofe de Carne','Patinho Moido','Carne de Panela (Ragu)'];
          formWrap.appendChild(hHTML('div',{class:'label'},'Sabor'));
          const sabRow=h('div',{style:{display:'grid',gap:'.35rem',marginBottom:'.5rem'}});
          ESCOND_SABORES.forEach(s=>{
            const ativo=iForm.escondSabor===s;
            const btn=h('button',{style:{padding:'.45rem .75rem',borderRadius:'8px',border:`1.5px solid ${ativo?'var(--dark)':'var(--border)'}`,background:ativo?'var(--dark)':'transparent',color:ativo?'var(--yellow)':'var(--muted)',fontWeight:'700',cursor:'pointer',fontFamily:'inherit',fontSize:'.82rem',textAlign:'left'}},s);
            btn.onclick=()=>{iForm.escondSabor=s;renderItems();};
            sabRow.appendChild(btn);
          });
          formWrap.appendChild(sabRow);
          formWrap.appendChild(hHTML('div',{class:'label'},'Tamanho'));
          const eRow=h('div',{style:{display:'flex',gap:'.5rem',marginBottom:'.5rem'}});
          [{t:'M',lbl:'M R$24'},{t:'G',lbl:'G R$26'}].forEach(({t,lbl})=>{
            const btn=h('button',{style:{flex:'1',padding:'.5rem',borderRadius:'8px',border:`1.5px solid ${iForm.tamanho===t?'var(--dark)':'var(--border)'}`,background:iForm.tamanho===t?'var(--dark)':'transparent',color:iForm.tamanho===t?'var(--yellow)':'var(--muted)',fontWeight:'700',cursor:'pointer',fontFamily:'inherit',fontSize:'.82rem'}},lbl);
            btn.onclick=()=>{iForm.tamanho=t;renderItems();};
            eRow.appendChild(btn);
          });
          formWrap.appendChild(eRow);

        } else if(itipoAtivo==='combo'){
          formWrap.appendChild(hHTML('div',{class:'label'},'Combo'));
          const cs2=h('select',{style:{marginBottom:'.5rem'}});
          COMBO_LIST.forEach(c=>{const op=h('option',{value:c.k},c.n);if(c.k===iForm.combo)op.selected=true;cs2.appendChild(op);});
          cs2.oninput=e=>{iForm.combo=e.target.value;renderItems();};
          formWrap.appendChild(cs2);
          formWrap.appendChild(hHTML('div',{class:'label'},'Tamanho'));
          const ctRow=h('div',{style:{display:'flex',gap:'.35rem',marginBottom:'.5rem'}});
          ['P','M','G'].forEach(t=>{
            const btn=h('button',{style:{flex:'1',padding:'.45rem',borderRadius:'8px',border:`1.5px solid ${iForm.tamanho===t?'var(--dark)':'var(--border)'}`,background:iForm.tamanho===t?'var(--dark)':'transparent',color:iForm.tamanho===t?'var(--yellow)':'var(--muted)',fontWeight:'700',cursor:'pointer',fontFamily:'inherit',fontSize:'.85rem'}},t);
            btn.onclick=()=>{iForm.tamanho=t;renderItems();};
            ctRow.appendChild(btn);
          });
          formWrap.appendChild(ctRow);
          // Composição do combo
          const itensCombo=COMBO_ITENS[iForm.combo]||[];
          if(itensCombo.length){
            formWrap.appendChild(hHTML('div',{class:'label',style:{marginBottom:'.35rem'}},'Composição'));
            const compList=h('div',{style:{background:'var(--bg-warm)',borderRadius:'8px',padding:'.5rem .75rem',display:'grid',gap:'.25rem'}});
            itensCombo.forEach((ci,i)=>{
              const row=h('div',{style:{fontSize:'.75rem',display:'flex',gap:'.4rem',alignItems:'baseline'}});
              row.innerHTML=`<span style="color:var(--yellow-deep);font-weight:700;font-size:.65rem;flex-shrink:0">${i+1}.</span><span style="font-weight:600">${ci.proteina}</span><span style="color:var(--muted)">+ ${ci.carbo}${ci.adicional?' + '+ci.adicional:''}</span>`;
              compList.appendChild(row);
            });
            formWrap.appendChild(compList);
          }
        }

        // Qtd + Adicionar
        const addBtnRow=h('div',{style:{display:'flex',gap:'.5rem',alignItems:'center',marginTop:'.65rem'}});
        const qtdWrap2=h('div',{style:{display:'flex',alignItems:'center',gap:'.3rem',background:'var(--bg-warm)',border:'1px solid var(--border)',borderRadius:'999px',padding:'.2rem .4rem'}});
        const qMinus=h('button',{style:{width:'28px',height:'28px',borderRadius:'50%',border:'none',background:'var(--border)',color:'var(--dark)',fontWeight:'700',fontSize:'1rem',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',fontFamily:'inherit'}},'−');
        const qVal=h('span',{style:{minWidth:'28px',textAlign:'center',fontWeight:'700',fontSize:'.95rem'}},String(iForm.qtd));
        const qPlus=h('button',{style:{width:'28px',height:'28px',borderRadius:'50%',border:'none',background:'var(--dark)',color:'var(--yellow)',fontWeight:'700',fontSize:'1rem',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',fontFamily:'inherit'}},'+');
        qMinus.onclick=()=>{iForm.qtd=Math.max(1,(+iForm.qtd||1)-1);qVal.textContent=String(iForm.qtd);updatePreview();};
        qPlus.onclick=()=>{iForm.qtd=(+iForm.qtd||1)+1;qVal.textContent=String(iForm.qtd);updatePreview();};
        qtdWrap2.appendChild(qMinus);qtdWrap2.appendChild(qVal);qtdWrap2.appendChild(qPlus);

        const pricePreview=h('span',{style:{flex:'1',fontSize:'.9rem',fontWeight:'700',color:'var(--muted)',textAlign:'center'}});
        const updatePreview=()=>{
          const it={tipo:itipoAtivo,proteina:iForm.proteina,tamanho:iForm.tamanho,gramas:iForm.gramas,carbo:iForm.carbo,semCarbo:iForm.semCarbo,adicionais:iForm.adicionais,variante:iForm.variante,combo:iForm.combo,escondSabor:iForm.escondSabor,qtd:iForm.qtd};
          pricePreview.textContent=fmtBRL(itemPreco(it)*(+iForm.qtd||1));
        };
        updatePreview();

        const addItemBtn=h('button',{class:'btn btn-yellow',style:{fontSize:'.82rem'}});
        addItemBtn.innerHTML=icons.plus+' Adicionar';
        addItemBtn.onclick=()=>{
          const novoItem={tipo:itipoAtivo,tamanho:iForm.tamanho,qtd:iForm.qtd};
          if(itipoAtivo==='marmita'){novoItem.proteina=iForm.proteina;novoItem.carbo=iForm.carbo;novoItem.semCarbo=iForm.semCarbo;novoItem.adicionais=[...iForm.adicionais];if(iForm.tamanho==='custom')novoItem.gramas=iForm.gramas;}
          else if(itipoAtivo==='caldo'){novoItem.variante=iForm.variante;}
          else if(itipoAtivo==='escondidinho'){novoItem.escondSabor=iForm.escondSabor||'Estrogonofe de Carne';}
          else if(itipoAtivo==='combo'){novoItem.combo=iForm.combo;}
          o.itens.push(novoItem);
          iForm.adicionais=[];iForm.qtd=1;iForm.gramas='';
          recalcOrder(o);renderItems();renderTotais();renderTotalBar();
        };
        addBtnRow.appendChild(qtdWrap2);addBtnRow.appendChild(pricePreview);addBtnRow.appendChild(addItemBtn);
        formWrap.appendChild(addBtnRow);
        itemsSection.appendChild(formWrap);
      };

      const itemsSection=h('div',{});
      body.appendChild(itemsSection);
      renderItems();

      // Totais manuais
      const totaisSection=h('div',{style:{marginTop:'.75rem'}});
      const renderTotais=()=>{
        totaisSection.innerHTML='';
        const vg=h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:'.5rem',marginBottom:'.7rem'}});
        const fv2=(lbl,key)=>{
          const w=h('div',{});w.appendChild(h('label',{class:'label'},lbl));

const PROT_G={P:120,M:150,G:180};
const CARBO_G={P:150,M:200,G:250};

function aggregateProd(orders){
  const proteinas={},carbos={},caldos={},especiais={};let total=0;
  orders.filter(o=>o.statusPedido!=='Cancelado').forEach(o=>{
    if(!o.itens?.length)return;
    total++;
    o.itens.forEach(it=>{
      const q=(+it.qtd||+it.quantidade)||1;
      const tam=it.tamanho||'M';

      if(it.tipo==='caldo'){
        const k=`Caldo de ${it.variante==='frango'?'Frango':'Carne'}`;
        caldos[k]=(caldos[k]||0)+q;return;
      }
      if(it.tipo==='escondidinho'){
        const sabor=it.escondSabor||'Carne de Panela (Ragu)';
        const g=PROT_G[it.tamanho||'M']||150;
        if(!proteinas[sabor])proteinas[sabor]=0;
        proteinas[sabor]+=g*q;
        // escondidinho tem purê de mandioca como base
        const carboKey='Pure de Mandioca';
        if(!carbos[carboKey])carbos[carboKey]=0;
        carbos[carboKey]+=(CARBO_G[it.tamanho||'M']||200)*q;
        return;
      }
      if(it.tipo==='combo'){
        const itens=COMBO_ITENS[it.combo]||[];
        const qtdCombo=(+it.qtd||+it.quantidade)||1;
        itens.forEach(ci=>{
          const g_prot=PROT_G[it.tamanho||'M']||150;
          const g_carbo=CARBO_G[it.tamanho||'M']||200;
          if(ci.proteina){
            if(!proteinas[ci.proteina])proteinas[ci.proteina]=0;
            proteinas[ci.proteina]+=g_prot*qtdCombo;
          }
          if(ci.carbo){
            if(!carbos[ci.carbo])carbos[ci.carbo]=0;
            carbos[ci.carbo]+=g_carbo*qtdCombo;
          }
          if(ci.adicional){
            especiais[ci.adicional]=(especiais[ci.adicional]||0)+qtdCombo;
          }
        });
        return;
      }
      // proteina — acumula em gramas
      const protNome=typeof it.proteina==='string'?it.proteina:it.proteina?.nome;
      if(protNome){
        const g=it.proteina?.gramas?+it.proteina.gramas:(PROT_G[tam]||150);
        if(!proteinas[protNome])proteinas[protNome]=0;
        proteinas[protNome]+=g*q;
      }
      // carbo — acumula em gramas
      const carboNome=typeof it.carbo==='string'?it.carbo:it.carbo?.nome;
      if(carboNome&&!it.semCarbo){
        const g=it.carbo?.gramas?+it.carbo.gramas:(CARBO_G[tam]||200);
        if(!carbos[carboNome])carbos[carboNome]=0;
        carbos[carboNome]+=g*q;
      }
      (it.adicionais||[]).forEach(a=>{
        const k=a.n||a.nome;
        if(k)especiais[k]=(especiais[k]||0)+q;
      });
    });
  });
  return{proteinas,carbos,caldos,especiais,total};
}

function buildMaisVende(orders){
  const sec=h('div',{style:{marginTop:'1rem',border:'1px solid var(--border)',borderRadius:'var(--radius)',background:'var(--surface)',overflow:'hidden'}});
  const isOpen=state._mvOpen||false;
  const prot={},carb={};
  orders.filter(o=>o.statusPedido!=='Cancelado').forEach(o=>(o.itens||[]).forEach(it=>{
    const q=(+it.qtd||+it.quantidade)||1;
    if(it.tipo==='caldo'||it.tipo==='escondidinho'||it.tipo==='combo')return;
    // proteina: string (novo) ou {nome} (antigo)
    const pn=typeof it.proteina==='string'?it.proteina:it.proteina?.nome;
    if(pn){if(!prot[pn])prot[pn]=0;prot[pn]+=q;}
    // carbo: string (novo) ou {nome} (antigo)
    const cn=typeof it.carbo==='string'?it.carbo:it.carbo?.nome;
    if(cn&&!it.semCarbo){if(!carb[cn])carb[cn]=0;carb[cn]+=q;}
  }));
  const topP=Object.entries(prot).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const topC=Object.entries(carb).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const hasData=topP.length>0||topC.length>0;

  const header=h('div',{style:{display:'flex',alignItems:'center',gap:'.5rem',padding:'.8rem 1rem',cursor:'pointer',userSelect:'none'},onClick:()=>setState({_mvOpen:!isOpen})});
  header.innerHTML=`<span style="font-weight:700;transition:.2s;transform:${isOpen?'rotate(90deg)':'rotate(0deg)'};display:inline-block;color:var(--muted)">▶</span>
    <div style="flex:1"><div class="label" style="margin:0">O que mais vende</div>
    ${!isOpen&&hasData&&topP[0]?`<div style="font-size:.75rem;color:var(--muted-2)">${topP[0][0]}${topC[0]?' · '+topC[0][0]:''}</div>`:''}</div>`;
  sec.appendChild(header);

  if(isOpen){
    const body=h('div',{style:{padding:'0 1rem 1rem',borderTop:'1px solid var(--border)'}});
    if(!hasData){body.innerHTML='<div class="empty" style="padding:1rem">Sem dados no filtro.</div>';}
    else{
      const grid=h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'1rem',paddingTop:'.75rem'}});
      const makeRank=(icon,lbl,data)=>{
        const d=h('div',{});d.innerHTML=`<div class="label" style="color:var(--yellow-deep);margin-bottom:.4rem">${icon} ${lbl}</div>`;
        data.forEach(([nome,v],i)=>{
          const row=h('div',{style:{display:'flex',alignItems:'center',gap:'.4rem',padding:'.28rem 0',borderBottom:'1px solid var(--border)',fontSize:'.8rem'}});
          row.innerHTML=`<span style="width:18px;height:18px;border-radius:50%;background:${i===0?'var(--yellow)':'var(--bg-warm)'};color:var(--dark);display:inline-flex;align-items:center;justify-content:center;font-size:.62rem;font-weight:700;flex-shrink:0">${i+1}</span>
            <span style="flex:1">${nome}</span>
            <strong>${v}×</strong>`;
          d.appendChild(row);
        });return d;
      };
      if(topP.length)grid.appendChild(makeRank('🥩','Proteínas',topP));
      if(topC.length)grid.appendChild(makeRank('🌾','Carbos',topC));
      body.appendChild(grid);
    }
    sec.appendChild(body);
  }
  return sec;
}

// ── CLIENTES VIEW ─────────────────────────────────────
function buildClientesView(){
  const DIAS_SUMIDO = 21;
  const customerMap={};
  state.pedidos.forEach(o=>{
    if(!o.telefone)return;
    if(!customerMap[o.telefone]){customerMap[o.telefone]={nome:o.nome,telefone:o.telefone,endereco:o.endereco,pedidos:[]}}
    customerMap[o.telefone].pedidos.push(o);
  });

  const getTag=(c,daysSince)=>{
    if(daysSince>DIAS_SUMIDO)return{lb:'Sumido',bg:'#F6D7D5',tx:'#8B3A36',key:'sumido'};
    if(c.pedidos.length===1)return{lb:'Novo',bg:'#E0EDD4',tx:'#2D5016',key:'novo'};
    return{lb:'Recorrente',bg:'#E0E7CF',tx:'#3F4F2A',key:'recorrente'};
  };

  const allCustomers=Object.values(customerMap).map(c=>{
    const lastDate=c.pedidos.map(p=>p.prazo).filter(Boolean).sort().pop();
    const daysSince=lastDate?Math.floor((Date.now()-new Date(lastDate))/(1000*60*60*24)):999;
    const tag=getTag(c,daysSince);
    return{...c,lastDate,daysSince,tag};
  });

  const filtro=state._clientesFiltro||'todos';
  const sumidosCount=allCustomers.filter(c=>c.tag.key==='sumido').length;
  const customers=allCustomers
    .filter(c=>filtro==='todos'||c.tag.key===filtro)
    .sort((a,b)=>{
      if(filtro==='todos'){
        const order={sumido:0,recorrente:1,novo:2};
        return(order[a.tag.key]||0)-(order[b.tag.key]||0)||a.nome.localeCompare(b.nome);
      }
      return a.nome.localeCompare(b.nome);
    });

  const wrap=h('div',{});

  // Header
  const titleRow=h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:'1.5rem',marginBottom:'1rem',flexWrap:'wrap',gap:'.5rem'}});

    const alertBadge=hHTML('div',{style:{display:'flex',alignItems:'center',gap:'.4rem',background:'#F6D7D5',borderRadius:'999px',padding:'.35rem .75rem',fontSize:'.78rem',fontWeight:'700',color:'#8B3A36'}},
      `⚠️ ${sumidosCount} sumido${sumidosCount>1?'s':''} há mais de ${DIAS_SUMIDO} dias`);
    titleRow.appendChild(alertBadge);
  }
  wrap.appendChild(titleRow);

  // Filter tabs
  const tabs=h('div',{style:{display:'flex',gap:'.35rem',marginBottom:'1.1rem',flexWrap:'wrap'}});
  [['todos','Todos',allCustomers.length],['sumido','Sumidos',sumidosCount],['recorrente','Recorrentes',allCustomers.filter(c=>c.tag.key==='recorrente').length],['novo','Novos',allCustomers.filter(c=>c.tag.key==='novo').length]].forEach(([key,lbl,cnt])=>{
    const btn=h('button',{class:`btn btn-ghost${filtro===key?' active':''}`,style:{fontSize:'.82rem'},onClick:()=>setState({_clientesFiltro:key})});
    btn.innerHTML=`${lbl} <span style="font-size:.7rem;opacity:.7">(${cnt})</span>`;
    tabs.appendChild(btn);
  });
  wrap.appendChild(tabs);

  if(allCustomers.length===0){
    wrap.appendChild(h('div',{class:'empty'},[h('div',{class:'empty-icon'},'👥'),h('div',{style:{fontWeight:'600'}},'Nenhum cliente ainda'),h('div',{style:{fontSize:'.85rem'}},'Os clientes aparecem ao criar pedidos com telefone.')]));
    return wrap;
  }

  if(customers.length===0){
    wrap.appendChild(hHTML('div',{class:'empty'},'Nenhum cliente nesse filtro.'));
    return wrap;
  }

  const list=h('div',{style:{display:'grid',gap:'.65rem'}});
  customers.forEach(c=>{
    const card=h('div',{class:'card',style:{borderLeft:c.tag.key==='sumido'?'4px solid #C4433F':''}});
    const total=c.pedidos.reduce((s,p)=>s+(+p.valor||0),0);
    const lastPedido=c.pedidos.filter(p=>p.prazo).sort((a,b)=>b.prazo>a.prazo?1:-1)[0];

    // Header
    const cardHdr=h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:'.5rem'}});
    cardHdr.innerHTML=`<div><div style="font-weight:700;font-size:1rem">${c.nome||'—'}</div><div style="font-size:.75rem;color:var(--muted);margin-top:.15rem">${fmtPhone(c.telefone)}</div></div>`;
    const tagEl=h('span',{class:'pill',style:{background:c.tag.bg,color:c.tag.tx,borderColor:c.tag.bg}},c.tag.lb);
    cardHdr.appendChild(tagEl);
    card.appendChild(cardHdr);

    // Stats
    const stats=h('div',{style:{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:'.5rem',paddingTop:'.6rem',borderTop:'1px solid var(--border)',marginBottom:'.65rem'}});
    stats.innerHTML=`

      <div style="text-align:center"><div style="font-size:.62rem;color:var(--muted);font-weight:700;text-transform:uppercase">Último pedido</div><div style="font-weight:700;font-size:.82rem">${c.lastDate?fmtDate(c.lastDate):'—'}</div></div>`;
    card.appendChild(stats);

    // Buttons
    const btnRow=h('div',{style:{display:'flex',gap:'.4rem',flexWrap:'wrap'}});

    // WhatsApp button
    if(c.telefone){
      const wa=h('a',{target:'_blank',class:'btn btn-ghost',style:{textDecoration:'none',fontSize:'.82rem'}});
      wa.innerHTML=icons.msg+' WhatsApp';
      wa.href=`https://wa.me/55${cleanPhone(c.telefone)}`;
      btnRow.appendChild(wa);
    }

    // Reengagement button for sumidos
    if(c.tag.key==='sumido'&&c.telefone){
      const msg=encodeURIComponent(`Oi ${c.nome.split(' ')[0]}! 😊 Tô com novidades aqui na Dias de Marmita e queria te contar. Posso te mandar o cardápio da semana?`);
      const re=h('a',{href:`https://wa.me/55${cleanPhone(c.telefone)}?text=${msg}`,target:'_blank',style:{display:'inline-flex',alignItems:'center',gap:'.35rem',padding:'.45rem .85rem',borderRadius:'999px',border:'1.5px solid #C4433F',background:'#F6D7D5',color:'#8B3A36',fontSize:'.82rem',fontWeight:'700',textDecoration:'none',cursor:'pointer'}});
      re.innerHTML='💬 Reconquistar';
      btnRow.appendChild(re);
    }

    // Days since last order badge
    if(c.daysSince<999&&c.daysSince>0){
      btnRow.appendChild(hHTML('span',{style:{marginLeft:'auto',fontSize:'.72rem',color:'var(--muted)',alignSelf:'center'}},`há ${c.daysSince} dias`));
    }

    card.appendChild(btnRow);
    list.appendChild(card);
  });
  wrap.appendChild(list);
  return wrap;
}

    const rightRow=h('div',{style:{display:'flex',gap:'.4rem'}});
    if(state.listaCompras.filter(i=>i.checked).length>0){const cb=h('button',{class:'btn btn-ghost',style:{fontSize:'.82rem'}},);cb.innerHTML='Limpar comprados';cb.onclick=clearListaComprada;rightRow.appendChild(cb);}
    if(pendLista>0){const cpb=h('button',{class:'btn btn-ghost',style:{fontSize:'.82rem'}});cpb.innerHTML='📋 Copiar';cpb.onclick=async()=>{const byCat={};state.listaCompras.filter(i=>!i.checked).forEach(i=>{if(!byCat[i.categoria])byCat[i.categoria]=[];byCat[i.categoria].push(i);});const lines=[`🛒 LISTA — ${new Date().toLocaleDateString('pt-BR')}\n`];Object.entries(byCat).forEach(([c,its])=>{lines.push(c);its.forEach(i=>lines.push(`  ☐ ${i.nome}${i.quantidade?' — '+i.quantidade+' '+i.unidade:''}`));lines.push('');});await copyText(lines.join('\n'));cpb.innerHTML='✓ Copiado!';setTimeout(()=>{cpb.innerHTML='📋 Copiar';},2000);};rightRow.appendChild(cpb);}
    subNav.appendChild(rightRow);wrap.appendChild(subNav);

    // add form
    let formNome='',formQtd='',formUnit='kg',formCat='Proteínas';
    const addForm=h('div',{class:'card',style:{marginBottom:'1rem'}});
    const fg=h('div',{style:{display:'grid',gridTemplateColumns:'1fr 70px 65px',gap:'.4rem',marginBottom:'.4rem'}});
    const ni=h('input',{type:'text',placeholder:'Nome do item'});ni.oninput=e=>formNome=e.target.value;ni.onkeydown=async e=>{if(e.key==='Enter'&&formNome.trim()){await saveListaItem({nome:formNome.trim(),quantidade:formQtd,unidade:formUnit,categoria:formCat});formNome='';ni.value='';qiEl.value='';}};
    const qiEl=h('input',{type:'number',placeholder:'Qtd'});qiEl.oninput=e=>formQtd=e.target.value;
    const uiEl=h('select',{});UNITS.forEach(u=>uiEl.appendChild(h('option',{value:u},u)));uiEl.oninput=e=>formUnit=e.target.value;
    fg.appendChild(ni);fg.appendChild(qiEl);fg.appendChild(uiEl);addForm.appendChild(fg);
    const fg2=h('div',{style:{display:'flex',gap:'.4rem'}});
    const catSel=h('select',{style:{flex:'1'}});CATS.forEach(c=>catSel.appendChild(h('option',{value:c},c)));catSel.oninput=e=>formCat=e.target.value;
    const addBtn=h('button',{class:'btn btn-yellow',style:{fontSize:'.82rem'}});addBtn.innerHTML=icons.plus+' Add';
    addBtn.onclick=async()=>{if(!formNome.trim())return;await saveListaItem({nome:formNome.trim(),quantidade:formQtd,unidade:formUnit,categoria:formCat});formNome='';ni.value='';qiEl.value='';};
    fg2.appendChild(catSel);fg2.appendChild(addBtn);addForm.appendChild(fg2);wrap.appendChild(addForm);

    if(state.listaCompras.length===0){wrap.appendChild(h('div',{class:'empty'},[h('div',{class:'empty-icon'},'🛒'),h('div',{style:{fontWeight:'600'}},'Lista vazia'),h('div',{style:{fontSize:'.85rem'}},'Adicione itens ou gere pelo estoque.')]));}
    else{
      const byCat={};state.listaCompras.forEach(i=>{if(!byCat[i.categoria])byCat[i.categoria]=[];byCat[i.categoria].push(i);});
      Object.entries(byCat).forEach(([cat,its])=>{
        wrap.appendChild(hHTML('div',{class:'label',style:{marginBottom:'.35rem'}},cat));
        const list=h('div',{style:{display:'grid',gap:'.3rem',marginBottom:'.85rem'}});
        its.forEach(item=>{
          const c=h('div',{class:'card',style:{display:'flex',alignItems:'center',gap:'.5rem',padding:'.55rem .8rem',opacity:item.checked?'.55':'1',transition:'all .15s',background:item.checked?'var(--bg-warm)':'var(--surface)'}});
          const chk=h('button',{style:{width:'20px',height:'20px',borderRadius:'5px',border:'2px solid',flexShrink:'0',display:'inline-flex',alignItems:'center',justifyContent:'center',cursor:'pointer',background:item.checked?'var(--dark)':'transparent',borderColor:item.checked?'var(--dark)':'var(--border-strong)',transition:'all .15s'}});
          if(item.checked)chk.innerHTML=icons.check.replace('width="16"','width="11"').replace('height="16"','height="11"').replace('currentColor','var(--yellow)');
          chk.onclick=()=>toggleListaItem(item.id);
          c.appendChild(chk);
          c.appendChild(hHTML('span',{style:{flex:'1',fontWeight:'600',textDecoration:item.checked?'line-through':'none',fontSize:'.85rem'}},item.nome));
          if(item.quantidade)c.appendChild(hHTML('span',{style:{fontSize:'.75rem',color:'var(--muted)'}},item.quantidade+' '+item.unidade));
          const db=h('button',{class:'btn-icon',style:{color:'#8B3A36',padding:'.2rem'}});db.innerHTML=icons.trash;db.onclick=()=>deleteListaItem(item.id);c.appendChild(db);
          list.appendChild(c);
        });
        wrap.appendChild(list);
      });
    }
  }
  return wrap;
}

// ── MODAL HELPERS ─────────────────────────────────────
function buildModal(title){
  const m=h('div',{class:'modal'});
  const mh=h('div',{class:'modal-header'});
  mh.appendChild(hHTML('h3',{class:'font-display',style:{fontSize:'1.2rem',fontWeight:'600',margin:'0'}},title));
  const xBtn=h('button',{class:'btn-icon'});xBtn.innerHTML=icons.x;xBtn.onclick=()=>{if(state.editing!==null)setState({editing:null});else if(state.showImport)setState({showImport:false});else if(state.showTemplates)setState({showTemplates:false});else if(state.savingAsTemplate)setState({savingAsTemplate:null});else if(state.showDelivery)setState({showDelivery:false});else if(state.showPendencias)setState({showPendencias:false});else if(state._showRelatorio)setState({_showRelatorio:false});else if(state.showFixasConfig)setState({showFixasConfig:false});else if(state._editEst!==null)setState({_editEst:null});else if(state.editingDespesa)setState({editingDespesa:null});};
  mh.appendChild(xBtn);m.appendChild(mh);
  return m;
}

function wrapModal(modal,onClose){
  const bg=h('div',{class:'modal-bg'});
  bg.onclick=e=>{if(e.target===bg){if(onClose)onClose();else{if(state.editing!==null)setState({editing:null});else if(state.showImport)setState({showImport:false});else if(state.showTemplates)setState({showTemplates:false});else if(state.savingAsTemplate)setState({savingAsTemplate:null});else if(state.showDelivery)setState({showDelivery:false});else if(state.showPendencias)setState({showPendencias:false});else if(state._showRelatorio)setState({_showRelatorio:false});else if(state.showFixasConfig)setState({showFixasConfig:false});else if(state._editEst!==null)setState({_editEst:null});else if(state.editingDespesa)setState({editingDespesa:null});}}};
  bg.appendChild(modal);
  return bg;
}

// ── INIT ──────────────────────────────────────────────
loadAll();
</script>
